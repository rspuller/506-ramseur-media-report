<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tripleseat Auth</title>
<style>
body{font-family:system-ui,sans-serif;max-width:560px;margin:80px auto;padding:0 1rem;background:#f5f4f1;color:#1e1d1b}
h2{font-size:1.2rem;margin-bottom:1rem}
.box{background:#fff;border-radius:10px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:1rem}
code{display:block;word-break:break-all;font-size:.85rem;background:#f0efeb;padding:.75rem;border-radius:6px;margin:.75rem 0}
button{background:#185fa5;color:#fff;border:none;padding:.55rem 1.1rem;border-radius:6px;cursor:pointer;font-size:.875rem;margin-right:.5rem}
.ok{color:#15803d;font-weight:600}
.err{color:#b91c1c}
</style>
</head>
<body>
<div class="box" id="out">Reading token from URL...</div>
<script>
function show(label, val, cls) {
  document.getElementById("out").innerHTML =
    "<h2>" + label + "</h2><code id='val'>" + val + "</code>" +
    "<button onclick='copy()'>Copy</button><span id='ok'></span>" +
    "<p style='margin-top:1rem;font-size:.85rem;color:#666'>Paste this into the terminal where ts_auth_helper.py is waiting.</p>";
}
function copy(){
  navigator.clipboard.writeText(document.getElementById("val").textContent);
  document.getElementById("ok").textContent = " Copied!";
  document.getElementById("ok").className = "ok";
}

// Handle both authorization code flow (query) and implicit flow (fragment)
const query  = new URLSearchParams(location.search);
const fragment = new URLSearchParams(location.hash.slice(1));

if (fragment.get("access_token")) {
  show("Access Token (implicit flow)", fragment.get("access_token"));
} else if (query.get("code")) {
  show("Authorization Code", query.get("code"));
} else if (query.get("error")) {
  document.getElementById("out").innerHTML = "<h2 class='err'>Error: " + query.get("error") + "</h2><p>" + (query.get("error_description")||"") + "</p>";
} else {
  document.getElementById("out").innerHTML = "<h2 class='err'>No token or code found in URL.</h2><pre>" + location.href + "</pre>";
}
</script>
</body>
</html>
