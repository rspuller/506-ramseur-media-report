<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>506 Ramseur Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ── Theme variables ──────────────────────────────────────────────── */
:root {
  --bg:             #f5f4f1;
  --text:           #1e1d1b;
  --text-secondary: #555;
  --text-muted:     #888;
  --text-faint:     #999;
  --text-faintest:  #aaa;
  --card-bg:        #fff;
  --card-shadow:    rgba(0,0,0,.08);
  --border:         #f0efeb;
  --border-strong:  #e8e6e0;
  --border-divider: #e4e3de;
  --border-dashed:  #e8e6e0;
  --hover-bg:       #fafaf8;
  --pill-bg:        #f0efeb;
  --chip-text:      #333;
  --term-bg:        #f8f8f6;
  --term-conv-bg:   #f0fdf4;
  --term-neg-bg:    #fef2f2;
  --exec-kpi-bg:    #f8f7f5;
  --canvas-bg:      #fafaf8;
  --header-bg:      #1e1d1b;
  --header-text:    #fff;
  --header-meta:    #b0afa9;
  --modal-overlay:  rgba(0,0,0,.45);
  --modal-bg:       #fff;
  --dropdown-bg:    #fff;
  --dropdown-border:#e0e0e0;
  --dropdown-shadow:rgba(0,0,0,.1);
  --nvr-new-bg:     #dbeafe;
  --nvr-new-text:   #1e40af;
  --nvr-ret-bg:     #fef3c7;
  --nvr-ret-text:   #92400e;
  --warn-bg:        #fffbeb;
  --warn-border:    #fbbf24;
  --warn-text:      #78350f;
  --campaign-total: #333;
  --toggle-bg:      #ddd;
  --toggle-knob:    #fff;
}
[data-theme="dark"] {
  --bg:             #141414;
  --text:           #e4e4e4;
  --text-secondary: #b0b0b0;
  --text-muted:     #888;
  --text-faint:     #777;
  --text-faintest:  #666;
  --card-bg:        #1e1e1e;
  --card-shadow:    rgba(0,0,0,.3);
  --border:         #2a2a2a;
  --border-strong:  #333;
  --border-divider: #333;
  --border-dashed:  #333;
  --hover-bg:       #252525;
  --pill-bg:        #2a2a2a;
  --chip-text:      #ccc;
  --term-bg:        #1a1a1a;
  --term-conv-bg:   #0f2918;
  --term-neg-bg:    #2a1215;
  --exec-kpi-bg:    #252525;
  --canvas-bg:      #1a1a1a;
  --header-bg:      #0a0a0a;
  --header-text:    #e4e4e4;
  --header-meta:    #777;
  --modal-overlay:  rgba(0,0,0,.7);
  --modal-bg:       #1e1e1e;
  --dropdown-bg:    #1e1e1e;
  --dropdown-border:#333;
  --dropdown-shadow:rgba(0,0,0,.4);
  --nvr-new-bg:     #1e3a5f;
  --nvr-new-text:   #93c5fd;
  --nvr-ret-bg:     #422006;
  --nvr-ret-text:   #fcd34d;
  --warn-bg:        #332b00;
  --warn-border:    #a68307;
  --warn-text:      #fbbf24;
  --campaign-total: #ccc;
  --toggle-bg:      #555;
  --toggle-knob:    #e4e4e4;
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  transition: background .3s, color .3s;
}

/* ── Site header ──────────────────────────────────────────────────── */
.site-header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 1.5rem 2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 1rem;
}
.site-header h1 {
  font-size: 1.375rem;
  font-weight: 700;
  letter-spacing: -.02em;
  flex: 1;
}
.header-meta {
  font-size: .8125rem;
  color: var(--header-meta);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .2rem;
}

/* ── Preset picker ───────────────────────────────────────────────── */
.preset-picker {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px;
  padding: .4rem .8rem;
  font-family: inherit;
  font-size: .8125rem;
  cursor: pointer;
  outline: none;
}
.preset-picker:hover {
  background: rgba(255,255,255,.18);
}
.preset-picker option {
  background: #1e1d1b;
  color: #fff;
}
.preset-picker.hidden { display: none; }
.custom-range-panel {
  display: flex;
  align-items: center;
  gap: .4rem;
  margin-top: .25rem;
}
.custom-range-panel.hidden { display: none; }
.custom-date-input {
  background: rgba(255,255,255,.12);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 5px;
  padding: .3rem .5rem;
  font-family: inherit;
  font-size: .75rem;
  outline: none;
  cursor: pointer;
  min-width: 90px;
  text-align: center;
}
.custom-date-input:hover { border-color: rgba(255,255,255,.4); }
.custom-range-sep { color: rgba(255,255,255,.6); font-size: .75rem; }
.cal-wrap { position: relative; display: inline-block; }
.cal-popup {
  display: none; position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
  background: #1e1e1e; border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
  padding: .5rem; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,.5);
  min-width: 220px; font-size: .75rem; color: #fff; user-select: none;
}
.cal-popup.open { display: block; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
.cal-nav button {
  background: none; border: none; color: #fff; cursor: pointer; font-size: .85rem;
  padding: .15rem .4rem; border-radius: 4px;
}
.cal-nav button:hover { background: rgba(255,255,255,.15); }
.cal-nav button:disabled { opacity: .25; cursor: default; }
.cal-nav button:disabled:hover { background: none; }
.cal-nav span { font-weight: 600; font-size: .8rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
.cal-grid .cal-hdr { font-size: .65rem; color: rgba(255,255,255,.45); padding: .15rem 0; }
.cal-grid .cal-day {
  padding: .25rem 0; border-radius: 4px; cursor: pointer; font-size: .75rem;
}
.cal-grid .cal-day:hover { background: rgba(255,255,255,.15); }
.cal-grid .cal-day.disabled { color: rgba(255,255,255,.2); cursor: default; }
.cal-grid .cal-day.disabled:hover { background: none; }
.cal-grid .cal-day.selected { background: rgba(255,255,255,.25); font-weight: 700; }
.cal-grid .cal-day.other-month { color: rgba(255,255,255,.15); }
.custom-apply-btn {
  background: rgba(255,255,255,.18);
  color: #fff;
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 5px;
  padding: .3rem .7rem;
  font-family: inherit;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
}
.custom-apply-btn:hover { background: rgba(255,255,255,.28); }

/* ── Theme toggle ────────────────────────────────────────────────── */
.theme-toggle {
  display: flex; align-items: center; gap: .5rem;
  cursor: pointer; user-select: none;
  font-size: .75rem; color: var(--header-meta);
}
.theme-toggle-track {
  width: 36px; height: 20px;
  background: var(--toggle-bg);
  border-radius: 20px;
  position: relative;
  transition: background .3s;
}
.theme-toggle-knob {
  width: 16px; height: 16px;
  background: var(--toggle-knob);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  transition: transform .3s;
}
[data-theme="dark"] .theme-toggle-knob { transform: translateX(16px); }
.theme-toggle-icon { font-size: .9rem; line-height: 1; }

/* ── Container ────────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

/* ── Accordion ────────────────────────────────────────────────────── */
.accordion { border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px var(--card-shadow); margin-bottom: 1rem; background: var(--card-bg); }
.accordion.open { overflow: visible; }

.acc-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .9rem 1.25rem;
  cursor: pointer;
  user-select: none;
  background: var(--card-bg);
  border: none;
  width: 100%;
  text-align: left;
  transition: background .15s;
  border-left: 4px solid transparent;
  color: var(--text);
}
.acc-header:hover { background: var(--hover-bg); }
.accordion.open .acc-header { border-left-color: var(--accent); }

.swatch {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--accent);
}
.acc-name { font-weight: 600; font-size: .9375rem; flex: 1; }

.pills { display: flex; gap: .35rem; flex-wrap: wrap; }
.pill {
  font-size: .6875rem; font-weight: 600; letter-spacing: .02em;
  padding: .15rem .5rem; border-radius: 100px;
  background: var(--pill-bg); color: var(--text-secondary);
}

.chips { display: flex; gap: .5rem; flex-wrap: wrap; }
.chip {
  font-size: .75rem; font-weight: 500;
  padding: .2rem .6rem; border-radius: 6px;
  background: var(--metric-bg); color: var(--chip-text);
}

.spend-badge {
  font-weight: 700; font-size: .9375rem;
  white-space: nowrap;
}

.chevron {
  width: 18px; height: 18px; flex-shrink: 0;
  color: var(--text-faintest);
  transition: transform .25s;
}
.accordion.open .chevron { transform: rotate(180deg); }

/* ── Accordion body ───────────────────────────────────────────────── */
.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.acc-body-inner {
  padding: 1.25rem 1.5rem 1.5rem;
  border-top: 1px solid var(--border);
}

/* ── Warning box ──────────────────────────────────────────────────── */
.warning-box {
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: 8px;
  padding: .65rem 1rem;
  font-size: .8125rem;
  color: var(--warn-text);
  margin-bottom: 1rem;
}

/* ── At-a-glance metric cards ─────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.metric-card {
  background: var(--metric-bg);
  border-radius: 8px;
  padding: .75rem 1rem;
}
.metric-label { font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: .25rem; }
.metric-value { font-size: 1.125rem; font-weight: 700; color: var(--text); }
.metric-sub   { font-size: .75rem; color: var(--text-muted); margin-top: .1rem; }
.metric-wow   { font-size: .7rem; font-weight: 600; margin-top: .15rem; }
.metric-wow.up   { color: #16a34a; }
.metric-wow.down { color: #dc2626; }
.metric-wow.flat { color: var(--text-muted); }

/* ── Executive Summary ────────────────────────────────────────────── */
.exec-summary {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 1px 6px var(--card-shadow);
  padding: 1.5rem 1.75rem 1.25rem;
  margin-bottom: 1.75rem;
}
.exec-summary-title {
  font-size: 1.0625rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: .1rem;
}
.exec-summary-subtitle {
  font-size: .8rem;
  font-weight: 500;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 1rem;
}
.exec-kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.exec-kpi {
  background: var(--exec-kpi-bg);
  border-radius: 8px;
  padding: .75rem 1rem;
}
.exec-kpi .metric-label { color: var(--text-muted); }
.exec-kpi .metric-value { font-size: 1.25rem; }

.exec-scorecard {
  width: 100%;
  border-collapse: collapse;
  font-size: .8125rem;
}
.exec-scorecard thead th {
  font-size: .6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-faint);
  text-align: left;
  padding: .4rem .6rem;
  border-bottom: 2px solid var(--border-strong);
}
.exec-scorecard thead th:not(:first-child) { text-align: right; }
.exec-scorecard tbody td {
  padding: .55rem .6rem;
  border-bottom: 1px solid var(--border);
}
.exec-scorecard tbody td:not(:first-child) {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.exec-scorecard .entity-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: .4rem;
  vertical-align: middle;
}
.exec-scorecard .entity-name {
  font-weight: 600;
  color: var(--text);
}
.exec-scorecard .wow-cell { font-weight: 600; font-size: .75rem; }
.exec-scorecard .wow-up   { color: #16a34a; }
.exec-scorecard .wow-down { color: #dc2626; }
.exec-scorecard .wow-flat { color: var(--text-faintest); }
.exec-scorecard .exec-leads-dd { position: relative; display: inline-block; }
.exec-scorecard .exec-leads-btn {
  background: none; border: 1px solid transparent; border-radius: 6px;
  color: var(--accent, var(--text)); font-weight: 700; font-size: inherit;
  cursor: pointer; padding: 2px 6px; display: inline-flex; align-items: center; gap: 4px;
  transition: border-color .15s;
}
.exec-scorecard .exec-leads-btn:hover { border-color: var(--accent, rgba(255,255,255,.3)); }
.exec-scorecard .exec-leads-btn svg { width: 12px; height: 12px; color: var(--text-faint); flex-shrink: 0; }
.exec-scorecard .exec-leads-list {
  display: none; position: absolute; right: 0; top: 100%; z-index: 999;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
  min-width: 320px; max-height: 260px; overflow-y: auto; box-shadow: 0 6px 20px rgba(0,0,0,.3);
  white-space: nowrap;
}
.exec-scorecard .exec-leads-list.open { display: block; }
.exec-scorecard .exec-leads-item {
  padding: 6px 12px; font-size: .8rem; cursor: pointer;
  border-bottom: 1px solid var(--border); color: var(--text);
}
.exec-scorecard .exec-leads-item:last-child { border-bottom: none; }
.exec-scorecard .exec-leads-item:hover { background: var(--metric-bg); color: var(--accent); }

/* ── Section date range label ─────────────────────────────────────── */
.section-date-range {
  font-size: .8rem;
  font-weight: 400;
  color: var(--text-faint);
  margin-left: .5rem;
}

/* ── Platform sections ────────────────────────────────────────────── */
.platform-section { margin-bottom: 1.25rem; }
.platform-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent);
  margin-bottom: .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border);
}
.campaign-name {
  font-size: .72rem; font-weight: 600; color: var(--text-secondary);
  padding: .45rem 0 .2rem;
  border-top: 1px dashed var(--border-dashed);
  margin-top: .35rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.campaign-name:first-of-type { border-top: none; margin-top: 0; }
.campaign-total {
  font-style: italic; color: var(--campaign-total);
  border-top: 1px solid var(--border-strong);
  margin-top: .5rem; padding-top: .5rem;
}
.platform-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem;
}
.prow-item { font-size: .8125rem; }
.prow-item strong { display: block; font-weight: 700; }
.prow-item span   { color: var(--text-muted); font-size: .75rem; }

/* ── Search terms ─────────────────────────────────────────────────── */
.search-terms-section { margin-top: .5rem; }
.search-terms-section h4 {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-secondary); margin-bottom: .65rem;
}
.search-terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.term-list { list-style: none; }
.term-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: .35rem .5rem;
  border-radius: 5px;
  font-size: .8rem;
  margin-bottom: .25rem;
  background: var(--term-bg);
}
.term-list li.converted { background: var(--term-conv-bg); }
.term-list li.negative  { background: var(--term-neg-bg); }
.term-name { flex: 1; margin-right: .5rem; word-break: break-word; }
.term-meta { font-size: .7rem; color: var(--text-muted); white-space: nowrap; }
.term-list li.converted .term-name { color: #15803d; }
.term-list li.negative  .term-name { color: #b91c1c; }

/* ── Summary table ────────────────────────────────────────────────── */
.summary-table { width: 100%; border-collapse: collapse; font-size: .8375rem; }
.summary-table th {
  text-align: left; font-weight: 600; font-size: .75rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); padding: .5rem .75rem; border-bottom: 2px solid var(--border-strong);
}
.summary-table td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.summary-table tr.entity-row td:first-child {
  border-left: 3px solid var(--accent);
  padding-left: .625rem;
}
.summary-footnote { font-size: .75rem; color: var(--text-muted); margin-top: .5rem; }

/* ── Empty state ──────────────────────────────────────────────────── */
.empty-state {
  font-size: .875rem; color: var(--text-faint); font-style: italic;
  padding: .5rem 0;
}

/* ── Tripleseat leads section ─────────────────────────────────────── */
.leads-section {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.leads-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .75rem;
}
.leads-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
}
.leads-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-size: .75rem; font-weight: 700;
  padding: .15rem .55rem; border-radius: 100px;
  min-width: 1.5rem;
}

/* custom dropdown */
.leads-dropdown { position: relative; display: inline-block; }
.leads-dropdown-btn {
  display: flex; align-items: center; gap: .4rem;
  background: var(--card-bg); border: 1px solid var(--border-strong); border-radius: 7px;
  padding: .4rem .75rem; font-size: .8125rem; font-family: inherit;
  cursor: pointer; color: var(--text); white-space: nowrap;
  transition: border-color .15s;
}
.leads-dropdown-btn:hover { border-color: var(--accent); }
.leads-dropdown-btn svg { width: 14px; height: 14px; color: var(--text-faint); flex-shrink: 0; }
.leads-dropdown-list { /* funnel section */
  position: absolute; top: 100%; left: 0; margin-top: .25rem;
  background: var(--dropdown-bg); border: 1px solid var(--dropdown-border); border-radius: 8px;
  box-shadow: 0 4px 16px var(--dropdown-shadow);
  min-width: 320px; max-height: 260px; overflow-y: auto;
  z-index: 1000; display: none; white-space: nowrap;
}
.leads-dropdown-list.open { display: block; }
.leads-dropdown-item {
  padding: .5rem .85rem; font-size: .8125rem; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s;
}
.leads-dropdown-item:last-child { border-bottom: none; }
.leads-dropdown-item:hover { background: var(--metric-bg); color: var(--accent); }

/* lead modal */
.lead-modal-overlay {
  position: fixed; inset: 0;
  background: var(--modal-overlay);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 1rem;
}
.lead-modal-box {
  background: var(--modal-bg); border-radius: 12px;
  box-shadow: 0 8px 40px var(--card-shadow);
  padding: 1.75rem 2rem;
  width: 100%; max-width: 440px;
  position: relative;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.lead-modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: #aaa; line-height: 1;
}
.lead-modal-close:hover { color: var(--text); }
.lead-modal-title {
  font-size: 1.0625rem; font-weight: 700; margin-bottom: 1.1rem;
  padding-right: 1.5rem; color: var(--text);
}
.lead-modal-fields { display: grid; grid-template-columns: auto 1fr; gap: .45rem .75rem; align-items: baseline; }
.lead-modal-key {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-muted); white-space: nowrap;
}

<script>
(function() {
  const html = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.setAttribute('data-theme', 'dark');
  }
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') === 'dark';
    if (isDark) {
      html.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
    }
    document.getElementById('theme-icon').innerHTML = html.getAttribute('data-theme') === 'dark' ? '&#9788;' : '&#9790;';
    // Refresh all --metric-bg CSS vars for the new theme
    document.querySelectorAll('.accordion, .entity-row').forEach(node => {
      const key = node.dataset.entityKey;
      if (key) {
        const sty = window.__ENTITY_STYLES?.[key];
        if (sty) node.style.setProperty('--metric-bg', window.getMetricBg(sty));
      }
    });
  });
  document.getElementById('theme-icon').innerHTML = html.getAttribute('data-theme') === 'dark' ? '&#9788;' : '&#9790;';
})();
</script>

  // -- Custom calendar picker -------------------------------------------------
  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
  const DAY_HDRS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  let calMin = '2026-01-01', calMax = '2026-12-31';

  if (_RAW_DATA.custom) {
    calMin = _RAW_DATA.custom.earliest;
    calMax = _RAW_DATA.custom.latest;
    customFrom.value = calMin;
    customTo.value = calMax;
  }

  function _fmtDisplay(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    return `${MONTH_NAMES[+m - 1].slice(0, 3)} ${+d}, ${y}`;
  }
  customFromDisplay.textContent = _fmtDisplay(customFrom.value);
  customToDisplay.textContent = _fmtDisplay(customTo.value);

  function _daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }

  function _renderCal(popupEl, targetInput, displayEl) {
    const cur = targetInput.value || calMin;
    let viewYear = +cur.slice(0, 4);
    let viewMonth = +cur.slice(5, 7) - 1;
    const minD = new Date(calMin + 'T00:00:00');
    const maxD = new Date(calMax + 'T00:00:00');
    const minY = minD.getFullYear(), minM = minD.getMonth();
    const maxY = maxD.getFullYear(), maxM = maxD.getMonth();

    function draw() {
      const canPrev = viewYear > minY || (viewYear === minY && viewMonth > minM);
      const canNext = viewYear < maxY || (viewYear === maxY && viewMonth < maxM);
      const dim = _daysInMonth(viewYear, viewMonth);
      const startDow = new Date(viewYear, viewMonth, 1).getDay();
      const selected = targetInput.value;

      let h = '<div class="cal-nav">';
      h += `<button class="cal-prev" ${canPrev ? '' : 'disabled'}>&lsaquo;</button>`;
      h += `<span>${MONTH_NAMES[viewMonth]} ${viewYear}</span>`;
      h += `<button class="cal-next" ${canNext ? '' : 'disabled'}>&rsaquo;</button>`;
      h += '</div><div class="cal-grid">';
      DAY_HDRS.forEach(d => h += `<div class="cal-hdr">${d}</div>`);

      // Leading blanks
      for (let i = 0; i < startDow; i++) h += '<div></div>';

      for (let day = 1; day <= dim; day++) {
        const iso = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dt = new Date(iso + 'T00:00:00');
        const disabled = dt < minD || dt > maxD;
        const sel = iso === selected;
        h += `<div class="cal-day${disabled ? ' disabled' : ''}${sel ? ' selected' : ''}" data-date="${iso}">${day}</div>`;
      }
      h += '</div>';
      popupEl.innerHTML = h;

      popupEl.querySelector('.cal-prev')?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (canPrev) { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } draw(); }
      });
      popupEl.querySelector('.cal-next')?.addEventListener('click', (e) => {
        e.stopPropagation();
        if (canNext) { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } draw(); }
      });
      popupEl.querySelectorAll('.cal-day:not(.disabled)').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          targetInput.value = el.dataset.date;
          displayEl.textContent = _fmtDisplay(el.dataset.date);
          popupEl.classList.remove('open');
        });
      });
    }
    draw();
    popupEl.classList.add('open');
  }

    e.stopPropagation();
    document.getElementById('cal-to').classList.remove('open');
    _renderCal(document.getElementById('cal-from'), customFrom, customFromDisplay);

  customToDisplay.addEventListener('click', (e) => {

  coworking:       { accent: '#c87520', metricBg: '#fef4e8', metricBgDark: '#2d2518' },
  office_cowork:   { accent: '#c87520', metricBg: '#fff3e6', metricBgDark: '#2d2518' },
  // SEO-only entities
  durham_bottling: { accent: '#185fa5', metricBg: '#eef4fb', metricBgDark: '#1a2a3d' },
  nerra_catering:  { accent: '#534ab7', metricBg: '#f2f0fc', metricBgDark: '#221f38' },
  nerra_dining:    { accent: '#2d7a7a', metricBg: '#e8f5f5', metricBgDark: '#1a2d2d' },
};

function getMetricBg(sty) {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  return isDark ? (sty.metricBgDark || '#252525') : (sty.metricBg || '#f5f4f1');
}
window.getMetricBg = getMetricBg;
window.__ENTITY_STYLES = ENTITY_STYLES;

const ENTITY_ORDER = ['events_506','catering','private_office','coworking','oak_and_glow','smashing_boxes'];

// ── Formatters ───────────────────────────────────────────────────────────────
const fmt = {
  currency: v => v == null ? '—' : '$' + (+v).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}),
  int:      v => v == null ? '—' : (+v).toLocaleString('en-US', {maximumFractionDigits:0}),
  pct:      v => v == null ? '—' : (+v*100).toFixed(1) + '%',
  dec:      (v,d=2) => v == null ? '—' : (+v).toFixed(d),
};

// ── Custom date range aggregation engine ─────────────────────────────────────

const ENTITY_LABELS = {
  events_506: 'Events at 506',
  private_office: 'Private Office',
  catering: 'Catering — Nerra',
  oak_and_glow: 'Oak & Glow Med Spa',
  smashing_boxes: 'Smashing Boxes',
  coworking: 'Coworking',
};
const SEO_ENTITY_LABELS = {
  smashing_boxes: 'Smashing Boxes',
  oak_and_glow: 'Oak & Glow Med Spa',
  durham_bottling: 'Durham Bottling Co.',
  nerra_catering: 'Nerra Catering',
  nerra_dining: 'Nerra Dining',
};
const SEO_ORDER = ['durham_bottling','nerra_catering','nerra_dining','oak_and_glow','smashing_boxes'];

function _formatDateRange(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if (fromStr === toStr) return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()}`;
  if (f.getMonth() === t.getMonth() && f.getFullYear() === t.getFullYear())
    return `${months[f.getMonth()]} ${f.getDate()}-${t.getDate()}, ${t.getFullYear()}`;
  return `${months[f.getMonth()]} ${f.getDate()}, ${f.getFullYear()} - ${months[t.getMonth()]} ${t.getDate()}, ${t.getFullYear()}`;
}

function _inRange(ts, from, to) {
  return ts >= from && ts <= to;
}

function _prevPeriod(fromStr, toStr) {
  const f = new Date(fromStr + 'T00:00:00');
  const t = new Date(toStr + 'T00:00:00');
  const span = Math.round((t - f) / 86400000) + 1;
  const pTo = new Date(f.getTime() - 86400000);
  const pFrom = new Date(pTo.getTime() - (span - 1) * 86400000);
  const pad = d => d.toISOString().slice(0, 10);
  return [pad(pFrom), pad(pTo)];
}

function buildCustomReport(fromStr, toStr) {
  const C = _RAW_DATA.custom;
  if (!C) return _RAW_DATA.presets[_RAW_DATA.default_preset]; // fallback

  const [prevFrom, prevTo] = _prevPeriod(fromStr, toStr);

  // -- Aggregate daily ad metrics per entity --------------------------------
  const entities = {};
  const ALL_ENTITIES = ['events_506','catering','private_office','coworking','oak_and_glow','smashing_boxes'];
  ALL_ENTITIES.forEach(ek => {
    const daily = C.daily_ads[ek] || {};
    let spend = 0, clicks = 0, impressions = 0, conversions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) {
        spend += m.spend; clicks += m.clicks;
        impressions += m.impressions; conversions += m.conversions;
      }
    });
    if (spend === 0 && clicks === 0 && impressions === 0 && conversions === 0) return;

    const platforms = [];
    // Determine platforms from data (simplified)
    if (spend > 0) platforms.push('Google');

    const cpl = conversions > 0 ? spend / conversions : null;
    entities[ek] = {
      label: ENTITY_LABELS[ek],
      platforms: platforms,
      total_spend: Math.round(spend * 100) / 100,
      total_clicks: clicks,
      total_conversions: Math.round(conversions * 100) / 100,
      cpl: cpl != null ? Math.round(cpl * 100) / 100 : null,
      google: { spend, clicks, impressions, conversions, ctr: clicks / (impressions || 1), cpc: clicks > 0 ? spend / clicks : 0 },
      meta: null,
      linkedin: null,
      google_campaigns: [],
      meta_campaigns: [],
      linkedin_campaigns: [],
      search_terms: [],
    };
  });

  // -- CRM funnel computation per entity ------------------------------------
  function _computeFunnel(records, fromS, toS) {
    const byEntity = {};
    records.filter(r => _inRange(r.ts, fromS, toS)).forEach(r => {
      const ek = r.entity;
      if (!byEntity[ek]) byEntity[ek] = { leads: [], tours: [], ts: [], ghl: [], hs: [], orn: [], office: [], orn_ms: [] };
      const bucket = r.src === 'tour' ? 'tours' : r.src === 'office' ? 'office' : r.src === 'orn' ? 'orn' : r.src === 'orn_ms' ? 'orn_ms' : r.src;
      if (byEntity[ek][bucket]) byEntity[ek][bucket].push(r);
    });
    return byEntity;
  }

  const crm = _computeFunnel(C.crm_records, fromStr, toStr);
  const prevCrm = _computeFunnel(C.crm_records, prevFrom, prevTo);

  function _tsFunnel(records) {
    const nl = records.length;
    const ps = records.filter(r => ['proposal', 'proposal sent'].includes(r.status)).length;
    const bk = records.filter(r => ['booked', 'closed', 'definite'].includes(r.status)).length;
    const td = records.filter(r => r.status === 'turned down').length;
    const rev = records.reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev, turned_down: td };
  }

  function _ghlFunnel(records) {
    const nl = records.length;
    const ps = records.filter(r => ['appt. requested','appt. confirmed','appt. completed'].includes(r.stage)).length;
    const bk = records.filter(r => r.stage === 'appt. completed').length;
    const rev = records.filter(r => r.stage === 'appt. completed').reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _hsFunnel(records) {
    const nl = records.length;
    const wonStages = ['closedwon', 'closed won'];
    const propStages = ['proposalsent', 'proposal sent', 'negotiation', ...wonStages];
    const ps = records.filter(r => propStages.includes(r.stage)).length;
    const bk = records.filter(r => wonStages.includes(r.stage)).length;
    const rev = records.filter(r => wonStages.includes(r.stage)).reduce((s, r) => s + (r.rev || 0), 0);
    return { new_leads: nl, proposals_sent: ps, events_booked: bk, revenue_collected: rev };
  }

  function _officeFunnel(crmGroup) {
    const ornRecs = crmGroup?.orn || [];
    const offRecs = crmGroup?.office || [];
    const tourRecs = crmGroup?.tours || [];
    const msRecs = crmGroup?.orn_ms || [];
    // Dedup office leads by email against OfficeRND
    const ornEmails = new Set(ornRecs.map(r => r.email).filter(Boolean));
    const uniqueOffice = offRecs.filter(r => !r.email || !ornEmails.has(r.email));
    const nl = ornRecs.length + uniqueOffice.length;
    // Tours: ORN drop-ins + calendar tours, deduped by name
    const ornDropInNames = new Set(ornRecs.filter(r => r.status === 'drop-in').map(r => (r.name || '').toLowerCase()));
    const uniqueTours = tourRecs.filter(t => !(t.name || '').toLowerCase() || !ornDropInNames.has((t.name || '').toLowerCase()));
    const dropInCount = ornRecs.filter(r => r.status === 'drop-in').length;
    const tours = dropInCount + uniqueTours.length;
    const memberships = msRecs.length;
    const mrr = msRecs.reduce((s, r) => s + (r.price || 0), 0);
    return { new_leads: nl, proposals_sent: tours, events_booked: memberships, revenue_collected: mrr };
  }

  // Attach funnels to entities
  function _attachFunnel(ek, funnel, prevFunnel, mktEntity) {
    if (!entities[ek]) {
      entities[ek] = {
        label: ENTITY_LABELS[ek], platforms: [], total_spend: 0, total_clicks: 0,
        total_conversions: 0, cpl: null, google: null, meta: null, linkedin: null,
        google_campaigns: [], meta_campaigns: [], linkedin_campaigns: [], search_terms: [],
      };
    }
    const e = entities[ek];
    const mktImp = e.google?.impressions || 0;
    const mktClk = e.google?.clicks || 0;
    const mktConv = Math.max(funnel.new_leads, e.total_conversions || 0);
    e.funnel = {
      ...funnel,
      marketing: { impressions: mktImp, clicks: mktClk, conversions: mktConv },
    };
    e.funnel_prev = prevFunnel;
  }

  // Events at 506
  const evCrm = (crm.events_506?.ts || []);
  const evPrev = (prevCrm.events_506?.ts || []);
  _attachFunnel('events_506', _tsFunnel(evCrm), _tsFunnel(evPrev), 'events_506');
  if (entities.events_506) entities.events_506.leads = evCrm;

  // Catering
  const catCrm = (crm.catering?.ts || []);
  const catPrev = (prevCrm.catering?.ts || []);
  _attachFunnel('catering', _tsFunnel(catCrm), _tsFunnel(catPrev), 'catering');
  if (entities.catering) entities.catering.leads = catCrm;

  // Food revenue split: move food revenue from events_506 to catering
  if (entities.events_506?.funnel && entities.catering?.funnel) {
    let foodTotal = 0, foodOrders = 0;
    evCrm.forEach(r => { if (r.food_rev > 0) { foodTotal += r.food_rev; foodOrders++; } });
    entities.events_506.funnel.revenue_collected -= foodTotal;
    entities.catering.funnel.revenue_collected += foodTotal;
    entities.catering.funnel.events_booked += foodOrders;
    // Same for prev period
    let prevFoodTotal = 0, prevFoodOrders = 0;
    evPrev.forEach(r => { if (r.food_rev > 0) { prevFoodTotal += r.food_rev; prevFoodOrders++; } });
    if (entities.events_506.funnel_prev) entities.events_506.funnel_prev.revenue_collected -= prevFoodTotal;
    if (entities.catering.funnel_prev) {
      entities.catering.funnel_prev.revenue_collected += prevFoodTotal;
      entities.catering.funnel_prev.events_booked += prevFoodOrders;
    }
  }

  // Oak & Glow
  const ghlCrm = (crm.oak_and_glow?.ghl || []);
  const ghlPrev = (prevCrm.oak_and_glow?.ghl || []);
  _attachFunnel('oak_and_glow', _ghlFunnel(ghlCrm), _ghlFunnel(ghlPrev), 'oak_and_glow');
  if (entities.oak_and_glow) entities.oak_and_glow.ghl_leads = ghlCrm;

  // Smashing Boxes
  const hsCrm = (crm.smashing_boxes?.hs || []);
  const hsPrev = (prevCrm.smashing_boxes?.hs || []);
  _attachFunnel('smashing_boxes', _hsFunnel(hsCrm), _hsFunnel(hsPrev), 'smashing_boxes');
  if (entities.smashing_boxes) entities.smashing_boxes.hs_leads = hsCrm;

  // Private Office & Coworking
  const poCrm = crm.private_office || {};
  const poPrev = prevCrm.private_office || {};
  const poFunnel = _officeFunnel(poCrm);
  const poPrevFunnel = _officeFunnel(poPrev);

  // Non-MRR revenue breakdown (Booking Fees + One-off Fees) from OfficeRND invoices
  const MEMBERSHIP_FEES_ACCOUNT = '64512ea0aedd42a098d83367';
  const MRR_STATUSES = new Set(['paid', 'overdue']);
  const _ONEOFF = '64512ea0aedd42a267d83368';
  const _BOOKING = '64512ea0aedd42b7d2d83369';
  const _NON_MRR = new Set([_ONEOFF, _BOOKING]);
  function _nonMrrBreakdownForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let booking = 0, oneoff = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === _BOOKING) booking += line.amount || 0;
        else if (line.account === _ONEOFF) oneoff += line.amount || 0;
      });
    });
    return { booking_fees: booking, oneoff_fees: oneoff };
  }
  // Total invoiced revenue (MRR + non-MRR) for Exec Summary Revenue column
  function _totalRevenueForMonth(yr, mo) {
    const target = `${yr}-${String(mo).padStart(2, '0')}`;
    let t = 0;
    (C.orn_payments || []).forEach(p => {
      if (p.period !== target) return;
      if (!MRR_STATUSES.has(p.status)) return;
      (p.lines || []).forEach(line => {
        if (line.account === MEMBERSHIP_FEES_ACCOUNT || _NON_MRR.has(line.account))
          t += line.amount || 0;
      });
    });
    return t;
  }
  const toDateObj = new Date(toStr + 'T00:00:00');
  const _bd = _nonMrrBreakdownForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
  poFunnel.booking_fees = _bd.booking_fees;
  poFunnel.oneoff_fees = _bd.oneoff_fees;
  const prevToObj = new Date(prevTo + 'T00:00:00');
  const _pbd = _nonMrrBreakdownForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  poPrevFunnel.booking_fees = _pbd.booking_fees;
  poPrevFunnel.oneoff_fees = _pbd.oneoff_fees;
  // Merge coworking ad metrics with private_office (zero out coworking to avoid double-count)
  if (entities.coworking && entities.private_office) {
    entities.private_office.total_spend += entities.coworking.total_spend;
    entities.private_office.total_clicks += entities.coworking.total_clicks;
    entities.private_office.total_impressions = (entities.private_office.google?.impressions || 0) + (entities.coworking.google?.impressions || 0);
    entities.coworking.total_spend = 0;
    entities.coworking.total_clicks = 0;
    entities.coworking.total_impressions = 0;
  }
  _attachFunnel('private_office', poFunnel, poPrevFunnel, 'private_office');
  // Exec Summary Revenue: total invoiced revenue (all MRR + non-MRR), not just new memberships
  if (entities.private_office) {
    entities.private_office.exec_revenue = _totalRevenueForMonth(toDateObj.getFullYear(), toDateObj.getMonth() + 1);
    entities.private_office.exec_revenue_prev = _totalRevenueForMonth(prevToObj.getFullYear(), prevToObj.getMonth() + 1);
  }
  if (entities.coworking) {
    entities.coworking.funnel = entities.private_office?.funnel;
    entities.coworking.funnel_prev = entities.private_office?.funnel_prev;
    entities.coworking.exec_revenue = entities.private_office?.exec_revenue;
    entities.coworking.exec_revenue_prev = entities.private_office?.exec_revenue_prev;
  }

  // -- SEO (simplified for custom ranges) -----------------------------------
  const seo = {};
  Object.entries(C.ga4_map).forEach(([propId, seoEntity]) => {
    const daily = C.daily_ga4[propId] || {};
    let sessions = 0, users = 0, prevSessions = 0;
    Object.entries(daily).forEach(([d, m]) => {
      if (_inRange(d, fromStr, toStr)) { sessions += m.sessions; users += m.users; }
      if (_inRange(d, prevFrom, prevTo)) { prevSessions += m.sessions; }
    });
    if (sessions === 0 && users === 0) return;
    const change = prevSessions > 0 ? (sessions - prevSessions) / prevSessions : null;
    seo[seoEntity] = {
      label: SEO_ENTITY_LABELS[seoEntity],
      ga4: {
        organic: { sessions, users, engagement_rate: null, bounce_rate: null, conversions: 0, conversion_rate: null },
        all_traffic: null,
        daily_organic: null,  // No sparkline for custom
        prev_organic: { sessions: prevSessions },
      },
      landing_pages: null,  // Not available for custom ranges
      new_vs_returning: null,
      organic_search: null,
    };
  });

  // -- Compute totals -------------------------------------------------------
  const totalSpend = Object.values(entities).reduce((s, e) => s + (e.total_spend || 0), 0);

  // -- Compute MRR for the selected month from invoiced payments data ---------
  const toDate = new Date(toStr + 'T00:00:00');
  const toYear = toDate.getFullYear();
  const toMonth = toDate.getMonth(); // 0-based
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-01`;
  const lastDay = new Date(toYear, toMonth + 1, 0).getDate();
  const lastOfMonth = `${toYear}-${String(toMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
  const targetPeriod = `${toYear}-${String(toMonth + 1).padStart(2, '0')}`;
  let mrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== targetPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) mrr += line.amount || 0;
    });
  });

  // -- MTD revenue (1st of month through toStr) ------------------------------
  const mtdFrom = firstOfMonth;
  let mtdRev = 0;
  C.crm_records.filter(r => _inRange(r.ts, mtdFrom, toStr)).forEach(r => {
    if (r.rev) mtdRev += r.rev;
  });
  mtdRev += mrr;

  // -- Previous-period ad spend -----------------------------------------------
  let prevTotalSpend = 0;
  Object.values(C.daily_ads).forEach(days => {
    Object.entries(days).forEach(([d, m]) => {
      if (_inRange(d, prevFrom, prevTo)) prevTotalSpend += m.spend;
    });
  });

  // -- Previous-month MRR & total revenue -------------------------------------
  const pmMonth = toMonth === 0 ? 11 : toMonth - 1;
  const pmYear = toMonth === 0 ? toYear - 1 : toYear;
  const pmFirst = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-01`;
  const pmLastDay = new Date(pmYear, pmMonth + 1, 0).getDate();
  const pmLast = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}-${String(pmLastDay).padStart(2, '0')}`;
  const pmPeriod = `${pmYear}-${String(pmMonth + 1).padStart(2, '0')}`;
  let prevMrr = 0;
  (C.orn_payments || []).forEach(p => {
    if (p.period !== pmPeriod) return;
    if (!MRR_STATUSES.has(p.status)) return;
    (p.lines || []).forEach(line => {
      if (line.account === MEMBERSHIP_FEES_ACCOUNT) prevMrr += line.amount || 0;
    });
  });
  let prevMtdRev = 0;
  C.crm_records.filter(r => _inRange(r.ts, pmFirst, pmLast)).forEach(r => {
    if (r.rev) prevMtdRev += r.rev;
  });
  prevMtdRev += prevMrr;

  return {
    date_range: _formatDateRange(fromStr, toStr),
    generated_date: _RAW_DATA.generated_date,
    total_spend: Math.round(totalSpend * 100) / 100,
    entities: entities,
    seo: seo,
    mtd_revenue: Math.round(mtdRev * 100) / 100,
    mtd_month_label: monthNames[toMonth] + ' ' + toYear,
    mrr: Math.round(mrr * 100) / 100,
    prev_total_spend: Math.round(prevTotalSpend * 100) / 100,
    prev_mrr: Math.round(prevMrr * 100) / 100,
    prev_mtd_revenue: Math.round(prevMtdRev * 100) / 100,
    _is_custom: true,
  };
}

// ── Header & renderDashboard ─────────────────────────────────────────────────
function renderDashboard() {
document.getElementById('header-dates').textContent     = REPORT.date_range;
document.getElementById('header-generated').textContent = _IS_PRESET_MODE
  ? 'Generated ' + _RAW_DATA.generated_date
  : 'Generated ' + REPORT.generated_date;

// ── Build UI ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');
app.innerHTML = '';

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (inner) e.innerHTML = inner;
  return e;
}

function metricCard(label, value, sub, wow) {
  const card = el('div', 'metric-card');
  let wowHtml = '';
  if (wow != null) {
    if (wow === 0) {
      wowHtml = '<div class="metric-wow flat">— No change</div>';
    } else if (wow === Infinity || wow === -Infinity) {
      // Previous period was 0
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} New</div>`;
    } else {
      const pct = Math.abs(wow * 100).toFixed(0);
      const arrow = wow > 0 ? '&#9650;' : '&#9660;';
      const cls = wow > 0 ? 'up' : 'down';
      wowHtml = `<div class="metric-wow ${cls}">${arrow} ${pct}% vs prev</div>`;
    }
  }
  card.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}${wowHtml}`;
  return card;
}

function pRowItem(label, value) {
  return `<div class="prow-item"><strong>${value}</strong><span>${label}</span></div>`;
}

// ── Summary accordion ────────────────────────────────────────────────────────
function buildSummary() {
  const entities = REPORT.entities;
  const rows = ENTITY_ORDER.map(key => {
    const e   = entities[key];
    const sty = ENTITY_STYLES[key];
    if (!e) return '';
    const cpl = e.cpl != null ? fmt.currency(e.cpl) : '—';
    return `
      <tr class="entity-row" data-entity-key="${key}" style="--accent:${sty.accent};--metric-bg:${getMetricBg(sty)}">
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${sty.accent};margin-right:.4rem;vertical-align:middle;"></span>${e.label}</td>
        <td>${e.platforms.join(', ') || '—'}</td>
        <td class="num">${fmt.currency(e.total_spend)}</td>
        <td class="num">${fmt.int(e.total_clicks)}</td>
        <td class="num">${fmt.dec(e.total_conversions)}</td>
        <td class="num">${cpl}</td>
      </tr>`;
  }).join('');

  const totalSpend = ENTITY_ORDER.reduce((s, k) => s + (entities[k]?.total_spend || 0), 0);

  const acc = buildAccordion('summary', '', 'Weekly Summary', [], [], fmt.currency(totalSpend), false);
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = `
    <table class="summary-table">
      <thead><tr>
        <th>Entity</th><th>Platforms</th>
        <th class="num">Spend</th><th class="num">Clicks</th>
        <th class="num">Conv.</th><th class="num">CPL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  return acc;
}

// ── Entity accordion ─────────────────────────────────────────────────────────
function buildEntityAccordion(key) {
  const e   = REPORT.entities[key];
  const sty = ENTITY_STYLES[key];
  if (!e) return null;

  const chips = [];
  if (e.total_clicks)      chips.push(`${fmt.int(e.total_clicks)} clicks`);
  if (e.total_conversions) chips.push(`${fmt.dec(e.total_conversions)} conv.`);
  if (e.cpl != null)       chips.push(`${fmt.currency(e.cpl)} CPL`);

  const acc = buildAccordion(key, sty.accent, e.label, e.platforms, chips, fmt.currency(e.total_spend));
  acc.style.setProperty('--metric-bg', getMetricBg(sty));
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = buildEntityBody(key, e, sty);
  return acc;
}

function buildEntityBody(key, e, sty) {
  let html = '';

  // No data state
  const hasAny = e.google || e.meta || e.linkedin;
  if (!hasAny) {
    return html + `<p class="empty-state">No active campaigns this period.</p>`;
  }

  // At-a-glance metrics — blended across all active platforms
  html += `<div class="metrics-grid">`;

  const blendSpend = e.total_spend;
  const blendClicks = e.total_clicks;
  const blendConv = e.total_conversions;
  const blendImpr = (e.google?.impressions || 0) + (e.meta?.impressions || 0) + (e.linkedin?.impressions || 0);
  const blendCTR = blendImpr ? blendClicks / blendImpr : null;
  const blendCPL = blendConv ? blendSpend / blendConv : null;
  const blendReach = Math.max(e.meta?.reach || 0, e.linkedin?.reach || 0) || null;
  const blendCPM = blendImpr ? (blendSpend * 1000 / blendImpr) : null;

  html += metricCard('Spend', fmt.currency(blendSpend), e.platforms.join(' + ')).outerHTML;
  html += metricCard('Clicks', fmt.int(blendClicks), `CTR ${fmt.pct(blendCTR)}`).outerHTML;
  if (key !== 'events_506') {
    html += metricCard('Conversions', fmt.dec(blendConv), `CPL ${fmt.currency(blendCPL)}`).outerHTML;
  } else {
    html += metricCard('Conversions', fmt.dec(blendConv), null).outerHTML;
  }
  const blendCPA = blendConv ? blendSpend / blendConv : null;
  const funnelRev = e.funnel?.revenue_collected || 0;
  const blendROAS = (funnelRev && blendSpend) ? (funnelRev / blendSpend) : null;
  html += metricCard('Impressions', fmt.int(blendImpr), null).outerHTML;
  html += metricCard('CPA', fmt.currency(blendCPA), 'Cost per Acquisition').outerHTML;
  html += metricCard('CPM', fmt.currency(blendCPM), null).outerHTML;
  html += `</div>`; // /metrics-grid
  // ROAS row hidden until attribution is sorted out
  // if (blendROAS != null) {
  //   html += `<div class="metrics-grid" style="grid-template-columns:repeat(2,1fr);margin-top:-.65rem">`;
  //   html += metricCard('ROAS', blendROAS.toFixed(2) + 'x', fmt.currency(funnelRev) + ' revenue / ' + fmt.currency(blendSpend) + ' spend').outerHTML;
  //   html += metricCard('Revenue', fmt.currency(funnelRev), 'From CRM').outerHTML;
  //   html += `</div>`;
  // }

  // Per-platform detail rows — broken out by campaign
  function gRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('Conversions', fmt.dec(c.conversions))}
      ${pRowItem('CPL', fmt.currency(c.cost_per_conversion))}
      ${pRowItem('Quality Score', c.quality_score != null ? fmt.dec(c.quality_score,1) : '—')}
      ${pRowItem('Impr. Share', c.search_impression_share != null ? fmt.pct(c.search_impression_share) : '—')}
    </div>`;
  }
  function mRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Frequency', c.frequency != null ? fmt.dec(c.frequency,2) : '—')}
      ${pRowItem('Link Clicks', fmt.int(c.link_clicks))}
      ${key !== 'events_506' ? pRowItem('Leads', fmt.int(c.leads)) : ''}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${key !== 'events_506' ? pRowItem('CPL', fmt.currency(c.cost_per_lead)) : ''}
      ${pRowItem('Engagement', fmt.int(c.engagement))}
    </div>`;
  }
  function lRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CPM', fmt.currency(c.cpm))}

      ${pRowItem('Leads (1-click)', fmt.int(c.leads))}
      ${pRowItem('Form Opens', fmt.int(c.form_opens))}

  if (e.google && e.google_campaigns && e.google_campaigns.length) {

      html += `<div class="campaign-name campaign-total">Total</div>${lRow(e.linkedin)}`;

  // Search terms removed from paid ads section per user request

  return html;
}

function buildSearchTerms(st, sty) {
  function termLi(t, cls) {
    const conv = t.conversions > 0 ? ' converted' : '';
    return `<li class="${cls}${t.conversions > 0 ? ' converted' : ''}">
      <span class="term-name">${t.term}</span>
      <span class="term-meta">${t.clicks} clk · $${(+t.spend).toFixed(2)}</span>
    </li>`;
  }

  const topHtml = st.top.map(t => termLi(t, '')).join('');
  const negHtml = st.negatives.map(t => termLi(t, 'negative')).join('');

  return `
  <div class="search-terms-section">

      <div>
        <h4>Top search terms — suggest as keywords</h4>
        <ul class="term-list">${topHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>

      <div>
        <h4>Search terms to review — negative keyword candidates</h4>
        <ul class="term-list">${negHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
    </div>
  </div>`;
}

// ── Generic leads section ────────────────────────────────────────────────────
function _leadItemLabel(l, statusField) {
  const name = l.name || '(unnamed)';
  const stat = statusField ? (l[statusField] || '') : '';
  if (!stat) return name;
  const lower = stat.toLowerCase();
  if (lower === 'booked' || lower === 'active') {
    return `${name} <span style="color:#22c55e;font-weight:700">(CLOSED WON)</span>`;
  }
  return `${name} <span style="opacity:.6">(${stat})</span>`;
}

function buildLeadsSection(leads, opts) {
  const label    = (opts && opts.label)    || 'Leads';
  const pfx      = (opts && opts.idPrefix) || 'leads';
  const sFld     = (opts && opts.statusField) || '';
  const count    = leads.length;
  const btnLabel = count === 0 ? 'No leads this period' : 'Select a lead';

  const itemsHtml = count === 0
    ? '<div class="leads-dropdown-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
    : leads.map((l, i) =>
        `<div class="leads-dropdown-item" data-lead-idx="${i}">${_leadItemLabel(l, sFld)}</div>`
      ).join('');

  return `
  <div class="leads-section">
    <div class="leads-header">
      <span class="leads-label">${label}</span>
      <span class="leads-count-badge">${count}</span>
      <div class="leads-dropdown" id="${pfx}-dd">
        <button class="leads-dropdown-btn" id="${pfx}-dd-btn" ${count === 0 ? 'disabled style="opacity:.5;cursor:default"' : ''}>
          ${btnLabel}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="leads-dropdown-list" id="${pfx}-dd-list">${itemsHtml}</div>
      </div>
    </div>
  </div>`;
}

function initLeadsDropdown(leads, idPrefix, openFn) {
  const pfx  = idPrefix || 'leads';
  const btn  = document.getElementById(pfx + '-dd-btn');
  const list = document.getElementById(pfx + '-dd-list');
  if (!btn || !list || leads.length === 0) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    list.classList.toggle('open');
  });

  list.addEventListener('click', e => {
    const item = e.target.closest('[data-lead-idx]');
    if (!item) return;
    list.classList.remove('open');
    openFn(leads[+item.dataset.leadIdx]);
  });
}

// ── Accordion builder ────────────────────────────────────────────────────────
function buildAccordion(key, accent, name, platforms, chips, spend, startOpen=false) {
  const sty = ENTITY_STYLES[key] || {};
  const acc = el('div', 'accordion' + (startOpen ? ' open' : ''));
  acc.dataset.entityKey = key.replace('_funnel', '');
  if (accent) acc.style.setProperty('--accent', accent);
  else if (sty.accent) acc.style.setProperty('--accent', sty.accent);
  acc.style.setProperty('--metric-bg', getMetricBg(sty));

  const swatchHtml = accent ? `<div class="swatch"></div>` : '';

  const pillsHtml = platforms.length
    ? `<div class="pills">${platforms.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`
    : '';

  const chipsHtml = chips.length
    ? `<div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`
    : '';

  const hdr = el('button', 'acc-header');
  hdr.setAttribute('aria-expanded', startOpen ? 'true' : 'false');
  hdr.innerHTML = `
    ${swatchHtml}
    <span class="acc-name">${name}</span>
    ${pillsHtml}
    ${chipsHtml}
    <span class="spend-badge">${spend}</span>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const body = el('div', 'acc-body');
  const bodyInner = el('div', 'acc-body-inner');
  body.appendChild(bodyInner);

  acc.appendChild(hdr);
  acc.appendChild(body);

  if (startOpen) {
    requestAnimationFrame(() => {
      body.style.maxHeight = 'none';
      body.style.overflow = 'visible';
    });
  }

  body.addEventListener('transitionend', (ev) => {
    if (ev.propertyName === 'max-height' && acc.classList.contains('open')) {
      body.style.overflow = 'visible';
      body.style.maxHeight = 'none';
    }
  });

  hdr.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      body.style.overflow = 'hidden';
      body.style.maxHeight = body.scrollHeight + 'px';
      requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      acc.classList.remove('open');
      hdr.setAttribute('aria-expanded', 'false');
    } else {
      body.style.overflow = 'hidden';
      acc.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 'px';
      hdr.setAttribute('aria-expanded', 'true');
    }
  });

  return acc;
}

const SEO_ORDER = ['durham_bottling', 'nerra_catering', 'nerra_dining', 'oak_and_glow', 'smashing_boxes'];

function fmtDuration(secs) {
  if (secs == null) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function buildSeoBody(entity, data, sty) {
  const ga4 = data.ga4 || {};
  const org  = ga4.organic;
  const daily = data.daily_organic || [];
  const wm = data.wow_mom || {};
  const lp = data.landing_pages || [];
  const nvr = data.new_vs_returning || {};
  const gsc = data.organic_search;
  let html = '';

  // ── Organic Sessions with trend + WoW ──
  html += `<div class="seo-section-label" style="color:${sty.accent}">Organic Sessions</div>`;
  if (!org || org.sessions === 0) {
    html += `<p class="empty-state">No organic search sessions this period.</p>`;
  } else {
    // Summary metrics row
    html += `<div class="metrics-grid">`;
    html += metricCard('Sessions', fmt.int(org.sessions), 'Organic Search').outerHTML;
    html += metricCard('Users', fmt.int(org.users), null).outerHTML;
    html += metricCard('Engaged', fmt.int(org.engaged_sessions), null).outerHTML;
    html += `</div>`;

    // WoW change
    if (wm.wow_change != null) {
      const pct = (wm.wow_change * 100).toFixed(1);
      const cls = wm.wow_change >= 0 ? 'up' : 'down';
      const arrow = wm.wow_change >= 0 ? '\u25B2' : '\u25BC';
      html += `<div class="seo-change-row">
        <div class="seo-change-item">
          <span class="change-val ${cls}">${arrow} ${Math.abs(pct)}%</span>
          <span class="change-label">vs previous ${wm.period_days}-day period (${fmt.int(wm.prev_total)} sessions)</span>
        </div>
      </div>`;
    }

    // Sparkline trend
    if (daily.length > 1) {
      html += `<canvas class="seo-trend-canvas" data-daily='${JSON.stringify(daily)}' data-color="${sty.accent}"></canvas>`;
    }
  }

  // ── Organic Conversions ──
  if (org && org.conversions > 0) {
    html += `<div class="seo-section-label">Organic Conversions</div>`;
    html += `<div class="seo-conv-row">
      <div class="seo-conv-item">
        <strong>${fmt.int(org.conversions)}</strong>
        <span>Conversions</span>
      </div>
      <div class="seo-conv-item">
        <strong>${fmt.pct(org.conversion_rate)}</strong>
        <span>Conversion Rate</span>
      </div>
    </div>`;
  }

  // ── Engagement Rate ──
  if (org && org.engagement_rate != null) {
    html += `<div class="seo-section-label">Organic Engagement</div>`;
    html += `<div class="metrics-grid">`;
    html += metricCard('Engagement Rate', fmt.pct(org.engagement_rate), null).outerHTML;
    html += metricCard('Bounce Rate', fmt.pct(org.bounce_rate), null).outerHTML;
    html += metricCard('Avg. Session', fmtDuration(org.avg_session_duration), null).outerHTML;
    html += `</div>`;
  }

  // ── Google Search Impressions + Avg Position ──
  html += `<div class="seo-section-label">Google Search Performance</div>`;
  if (gsc) {
    html += `<div class="seo-gsc-grid">`;
    html += metricCard('Impressions', fmt.int(gsc.impressions), null).outerHTML;
    html += metricCard('Clicks', fmt.int(gsc.clicks), null).outerHTML;
    html += metricCard('Avg. Position', gsc.avg_position != null ? gsc.avg_position.toFixed(1) : '—', null).outerHTML;
    html += metricCard('CTR', fmt.pct(gsc.ctr), null).outerHTML;
    html += `</div>`;
  } else {
    html += `<p class="empty-state">Pending GSC Connection</p>`;
  }

  // ── Top Queries Driving Traffic ──
  const topQueries = data.top_queries || [];
  html += `<div class="seo-section-label">Top Queries Driving Traffic</div>`;
  if (topQueries.length) {
    html += `<table class="seo-lp-table seo-query-table"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(0, 10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${fmt.int(q.impressions)}</td>
        <td>${fmt.pct(q.ctr)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No search query data this period.</p>`;
  }

  // ── Top 10 Organic Landing Pages ──
  html += `<div class="seo-section-label">Top Organic Landing Pages</div>`;
  if (lp.length) {
    html += `<table class="seo-lp-table"><thead><tr><th>Page</th><th>Sessions</th></tr></thead><tbody>`;
    for (const p of lp) {
      const style = p.is_other ? ' style="color:#888;font-style:italic;border-top:1px solid #e0e0e0"' : '';
      html += `<tr><td${style}>${p.page}</td><td${style}>${fmt.int(p.sessions)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No organic landing page data this period.</p>`;
  }

  // ── New vs Returning Users ──
  html += `<div class="seo-section-label">New vs Returning (Organic)</div>`;
  if (nvr.new_sessions || nvr.returning_sessions) {
    const newPct = nvr.new_pct != null ? (nvr.new_pct * 100).toFixed(0) : 0;
    const retPct = nvr.returning_pct != null ? (nvr.returning_pct * 100).toFixed(0) : 0;
    html += `<div class="seo-nvr-bar">
      <div class="new" style="width:${newPct}%">${newPct}%</div>
      <div class="ret" style="width:${retPct}%">${retPct}%</div>
    </div>`;
    html += `<div class="seo-nvr-legend">
      <div>New: <span>${fmt.int(nvr.new_sessions)}</span> sessions · <span>${fmt.int(nvr.new_users)}</span> users</div>
      <div>Returning: <span>${fmt.int(nvr.returning_sessions)}</span> sessions · <span>${fmt.int(nvr.returning_users)}</span> users</div>
    </div>`;
  } else {
    html += `<p class="empty-state">No new vs returning data this period.</p>`;
  }

  // ── All Queries (expandable) ──
  if (topQueries.length > 10) {
    const remainId = `gsc-more-${entity}`;
    html += `<div style="text-align:center;margin:.5rem 0">
      <button class="seo-show-more-btn" onclick="document.getElementById('${remainId}').classList.toggle('hidden');this.textContent=this.textContent==='Show all queries'?'Show fewer':'Show all queries'">Show all queries</button>
    </div>`;
    html += `<table id="${remainId}" class="seo-lp-table seo-query-table hidden"><thead><tr>
      <th>Query</th><th>Clicks</th><th>Impressions</th><th>CTR</th><th>Avg. Pos</th>
    </tr></thead><tbody>`;
    for (const q of topQueries.slice(10)) {
      html += `<tr>
        <td>${q.query}</td>
        <td>${fmt.int(q.clicks)}</td>
        <td>${fmt.int(q.impressions)}</td>
        <td>${fmt.pct(q.ctr)}</td>
        <td>${q.position.toFixed(1)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  return html;
}

  catering:       ['New Leads', 'Proposals Sent', 'Orders Placed', 'Revenue Collected', 'Leads Turned Down'],

const FUNNEL_ORDER = [

function buildFunnelAccordion(cfg) {
  const sty = ENTITY_STYLES[cfg.key] || ENTITY_STYLES['private_office'];
  const entities = REPORT.entities;

  // For office_cowork, funnel is pre-computed from OfficeRND in build.py
  // and stored on the private_office entity
  let funnel;
  if (cfg.key === 'office_cowork') {
    funnel = entities.private_office?.funnel || {};
  } else {
    funnel = entities[cfg.key]?.funnel || {};
  }

  const fLabels = FUNNEL_LABELS[cfg.funnelKey];
  const chips = [];
  if (funnel.new_leads) chips.push(`${funnel.new_leads} leads`);
  const totalFunnelRev = (funnel.revenue_collected || 0) + (funnel.booking_fees || 0) + (funnel.oneoff_fees || 0);
  if (totalFunnelRev) chips.push(fmt.currency(totalFunnelRev));

  const acc = buildAccordion(cfg.key + '_funnel', sty.accent, cfg.label, [], chips, '');
  acc.style.setProperty('--metric-bg', getMetricBg(sty));
  const badge = acc.querySelector('.spend-badge');
  if (badge) badge.style.display = 'none';

  // Marketing conversion funnel (placeholders)
  const mktg = funnel.marketing || {};
  let html = '';
  html += `<div class="section-subtitle" style="margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Marketing Conversion Funnel</div>`;
  html += `<div class="funnel-grid" style="grid-template-columns:repeat(3,1fr)">`;
  html += metricCard('Impressions', fmt.int(mktg.impressions || 0), null).outerHTML;
  html += metricCard('Clicks', fmt.int(mktg.clicks || 0), null).outerHTML;
  html += metricCard('Conversions', fmt.int(mktg.conversions || 0), null).outerHTML;
  html += `</div>`;

  // Sales funnel with stage-to-stage conversion rates + WoW indicators
  let funnelPrev;
  if (cfg.key === 'office_cowork') {
    funnelPrev = entities.private_office?.funnel_prev || {};
  } else {
    funnelPrev = entities[cfg.key]?.funnel_prev || {};
  }
  function wowChange(curr, prev) {
    if (prev == null || curr == null) return null;
    if (prev === 0 && curr === 0) return 0;
    if (prev === 0) return curr > 0 ? Infinity : null;
    return (curr - prev) / prev;
  }

  html += `<div class="section-subtitle" style="margin-top:1rem;margin-bottom:.4rem;font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;">Sales Funnel</div>`;
  const fNL = funnel.new_leads || 0;
  const fPS = funnel.proposals_sent || 0;
  const fEB = funnel.events_booked || 0;
  const fRC = funnel.revenue_collected || 0;
  const pNL = funnelPrev.new_leads;
  const pPS = funnelPrev.proposals_sent;
  const pEB = funnelPrev.events_booked;
  const pRC = funnelPrev.revenue_collected;
  const rate1 = fNL > 0 ? ((fPS / fNL) * 100).toFixed(0) + '% conv.' : null;
  const rate2 = fPS > 0 ? ((fEB / fPS) * 100).toFixed(0) + '% conv.' : null;
  html += `<div class="funnel-grid">`;
  html += metricCard(fLabels[0], fmt.int(fNL), null, wowChange(fNL, pNL)).outerHTML;
  html += metricCard(fLabels[1], fmt.int(fPS), rate1, wowChange(fPS, pPS)).outerHTML;
  html += metricCard(fLabels[2], fmt.int(fEB), rate2, wowChange(fEB, pEB)).outerHTML;
  html += metricCard(fLabels[3], fmt.currency(fRC), null, wowChange(fRC, pRC)).outerHTML;
  html += `</div>`;
  // Extra revenue boxes for Private Office & Coworking
  if (cfg.key === 'office_cowork' && fLabels.length > 4) {
    const fBF = funnel.booking_fees || 0;
    const fOF = funnel.oneoff_fees || 0;
    const pBF = funnelPrev.booking_fees;
    const pOF = funnelPrev.oneoff_fees;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(2,1fr);margin-top:-.25rem">`;
    html += metricCard(fLabels[4], fmt.currency(fBF), null, wowChange(fBF, pBF)).outerHTML;
    html += metricCard(fLabels[5], fmt.currency(fOF), null, wowChange(fOF, pOF)).outerHTML;
    html += `</div>`;
  }
  // Leads Turned Down box for Events at 506 and Catering
  if ((cfg.key === 'events_506' || cfg.key === 'catering') && fLabels.length > 4) {
    const fTD = funnel.turned_down || 0;
    const pTD = funnelPrev.turned_down;
    html += `<div class="funnel-grid" style="grid-template-columns:repeat(1,1fr);max-width:25%;margin-top:-.25rem">`;
    html += metricCard(fLabels[4], fmt.int(fTD), null, wowChange(fTD, pTD)).outerHTML;
    html += `</div>`;
  }

  // Leads dropdown if applicable
  if (cfg.leadsKey) {
    // For office_cowork, leads are on the private_office entity
    const srcEntity = cfg.key === 'office_cowork' ? 'private_office' : cfg.key;
    let leads = Array.isArray(entities[srcEntity]?.[cfg.leadsKey]) ? entities[srcEntity][cfg.leadsKey] : [];
    // Filter out "Turned Down" leads from dropdown for Events at 506 and Catering
    if (cfg.key === 'events_506' || cfg.key === 'catering') {
      leads = leads.filter(l => (l[cfg.statusField] || '').toLowerCase() !== 'turned down');
    }
    html += buildLeadsSection(leads, { label: cfg.leadsLabel, idPrefix: cfg.leadsPrefix, statusField: cfg.statusField });
  }

  acc.querySelector('.acc-body-inner').innerHTML = html;
  return acc;
}

// ── Collapsible section builder ─────────────────────────────────────────────
function buildCollapsibleSection(title, id) {
  const wrapper = el('div', '', '');
  wrapper.id = id;

  const toggle = el('div', 'section-toggle');
  toggle.innerHTML = `
    <h2 class="section-heading" style="margin-bottom:0">${title}</h2>
    <svg class="section-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const content = el('div', 'section-content');

  toggle.addEventListener('click', () => {
    const isOpen = toggle.classList.contains('open');
    if (isOpen) {
      toggle.classList.remove('open');
      content.classList.remove('open');
      content.style.maxHeight = '0';
    } else {
      toggle.classList.add('open');
      content.classList.add('open');
      content.style.maxHeight = 'none';
    }
  });

  wrapper.appendChild(toggle);
  wrapper.appendChild(content);
  return { wrapper, content };
}

// ── Executive Summary ────────────────────────────────────────────────────────
function buildExecutiveSummary() {
  const entities = REPORT.entities;

  // Gather funnel data per entity (same logic as buildFunnelAccordion)
  const EXEC_ENTITIES = [
    { key: 'events_506',    label: 'Events at 506',               entityKey: 'events_506',     statusField: 'status' },
    { key: 'catering',      label: 'Catering — Nerra',            entityKey: 'catering',       statusField: 'status' },
    { key: 'office_cowork', label: 'Private Office & Coworking',  entityKey: 'private_office', statusField: 'status' },
    { key: 'oak_and_glow',  label: 'Oak & Glow Med Spa',          entityKey: 'oak_and_glow',   statusField: 'stage' },
    { key: 'smashing_boxes',label: 'Smashing Boxes',              entityKey: 'smashing_boxes', statusField: 'stage' },
  ];

  function getFunnel(cfg) {
    if (cfg.key === 'office_cowork') return entities.private_office?.funnel || {};
    return entities[cfg.key]?.funnel || {};
  }
  function getFunnelPrev(cfg) {
    if (cfg.key === 'office_cowork') return entities.private_office?.funnel_prev || {};
    return entities[cfg.key]?.funnel_prev || {};
  }
  function getSpend(cfg) {
    if (cfg.key === 'office_cowork') {
      return (entities.private_office?.total_spend || 0) + (entities.coworking?.total_spend || 0);
    }
    return entities[cfg.entityKey]?.total_spend || 0;
  }
  function getAccent(cfg) {
    const sty = ENTITY_STYLES[cfg.key] || ENTITY_STYLES[cfg.entityKey];
    return sty?.accent || '#888';
  }
  function getLeads(cfg) {
    let leads;
    switch (cfg.key) {
      case 'events_506':     leads = REPORT.entities?.events_506?.leads || []; break;
      case 'catering':       leads = REPORT.entities?.catering?.leads || []; break;
      case 'office_cowork':  leads = REPORT.entities?.private_office?.orn_leads || []; break;
      case 'oak_and_glow':   leads = REPORT.entities?.oak_and_glow?.ghl_leads || []; break;
      case 'smashing_boxes': leads = REPORT.entities?.smashing_boxes?.hs_leads || []; break;
      default: leads = [];
    }
    // Filter out "Turned Down" leads from dropdown for Events at 506 and Catering
    if (cfg.key === 'events_506' || cfg.key === 'catering') {
      leads = leads.filter(l => (l[cfg.statusField] || '').toLowerCase() !== 'turned down');
    }
    return leads;
  }
  function getLeadModalFn(cfg) {
    switch (cfg.key) {
      case 'events_506':     return openLeadModal;
      case 'catering':       return openLeadModal;
      case 'office_cowork':  return openOrnLeadModal;
      case 'oak_and_glow':   return openGhlLeadModal;
      case 'smashing_boxes': return openHsLeadModal;
      default: return openLeadModal;
    }
  }

  // Aggregate totals
  let totalLeads = 0, totalNewRevenue = 0, totalSpend = 0;
  let prevTotalLeads = 0, prevTotalNewRevenue = 0;
  const rows = [];

  // Scorecard Revenue column: total invoiced revenue for PO&CW, funnel revenue for others
  function getScoreCardRevenue(cfg) {
    const ent = (cfg.key === 'office_cowork') ? entities.private_office : entities[cfg.entityKey];
    if (ent && ent.exec_revenue != null) return ent.exec_revenue;
    const f = (cfg.key === 'office_cowork') ? (ent?.funnel || {}) : (entities[cfg.entityKey]?.funnel || {});
    return f.revenue_collected || 0;
  }

  EXEC_ENTITIES.forEach(cfg => {
    const f = getFunnel(cfg);
    const fp = getFunnelPrev(cfg);
    const nl = f.new_leads || 0;
    const funnelRev = (f.revenue_collected || 0) + (f.booking_fees || 0) + (f.oneoff_fees || 0);  // new revenue only (for KPI card)
    const scoreRev = getScoreCardRevenue(cfg);            // total invoiced for scorecard column
    const spend = getSpend(cfg);
    const prevNl = fp.new_leads || 0;
    const prevFunnelRev = (fp.revenue_collected || 0) + (fp.booking_fees || 0) + (fp.oneoff_fees || 0);

    totalLeads += nl;
    totalNewRevenue += funnelRev;
    totalSpend += spend;
    prevTotalLeads += prevNl;
    prevTotalNewRevenue += prevFunnelRev;

    // WoW for leads
    let wowLeads;
    if (prevNl === 0 && nl === 0) wowLeads = 0;
    else if (prevNl === 0) wowLeads = Infinity;
    else wowLeads = (nl - prevNl) / prevNl;

    rows.push({ cfg, nl, rev: scoreRev, spend, wowLeads, leads: getLeads(cfg), modalFn: getLeadModalFn(cfg), statusField: cfg.statusField });
  });

  // Portfolio-level WoW
  function wowPct(curr, prev) {
    if (prev === 0 && curr === 0) return 0;
    if (prev === 0) return Infinity;
    return (curr - prev) / prev;
  }
  const wowTotalLeads = wowPct(totalLeads, prevTotalLeads);
  const wowTotalNewRev = wowPct(totalNewRevenue, prevTotalNewRevenue);
  // const blendedROAS   = totalSpend > 0 ? totalNewRevenue / totalSpend : null;

  // vs-prev for MRR, MTD revenue, ad spend
  const mrr = REPORT.mrr || 0;
  const prevMrr = REPORT.prev_mrr || 0;
  const wowMrr = wowPct(mrr, prevMrr);
  const mtdRevenue = REPORT.mtd_revenue || 0;
  const prevMtdRevenue = REPORT.prev_mtd_revenue || 0;
  const wowMtd = wowPct(mtdRevenue, prevMtdRevenue);
  const prevTotalSpend = REPORT.prev_total_spend || 0;
  const wowSpend = wowPct(totalSpend, prevTotalSpend);
  const mtdLabel = REPORT.mtd_month_label || '';

  // Build HTML
  const section = el('div', 'exec-summary');
  let html = '';
  html += `<div class="exec-summary-title">Executive Summary</div>`;
  html += `<div class="exec-summary-subtitle">Portfolio Overview &mdash; ${REPORT.date_range}</div>`;

  html += `<div class="exec-kpi-grid">`;
  // Row 1: Revenue
  html += metricCard('New Revenue this Period', fmt.currency(totalNewRevenue), 'From all pipelines', wowTotalNewRev).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  html += metricCard('MRR This Month', fmt.currency(mrr), 'Private Office & Coworking', wowMrr).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  html += metricCard('Total Revenue This Month', fmt.currency(mtdRevenue), mtdLabel, wowMtd).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  // Row 2: Leads, Spend, ROAS
  html += metricCard('Total New Leads', fmt.int(totalLeads), 'Across all entities', wowTotalLeads).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  html += metricCard('Total Ad Spend', fmt.currency(totalSpend), 'Google + Meta', wowSpend).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  // ROAS card hidden until attribution is sorted out
  // html += metricCard('Blended ROAS', blendedROAS != null ? blendedROAS.toFixed(2) + 'x' : '—', blendedROAS != null ? fmt.currency(totalRevenue) + ' / ' + fmt.currency(totalSpend) : null, null).outerHTML.replace('metric-card', 'metric-card exec-kpi');
  html += `</div>`;

  // Entity scorecard table
  html += `<table class="exec-scorecard">`;
  html += `<thead><tr>
    <th>Entity</th>
    <th>New Leads</th>
    <th>Leads vs Prev</th>
    <th>Ad Spend</th>
    <th>Revenue</th>
  </tr></thead>`;
  html += `<tbody>`;

  rows.forEach(r => {
    const accent = getAccent(r.cfg);
    // Leads vs prev cell
    let wowHtml;
    if (r.wowLeads === 0) {
      wowHtml = '<span class="wow-cell wow-flat">—</span>';
    } else if (r.wowLeads === Infinity) {
      wowHtml = '<span class="wow-cell wow-up">&#9650; New</span>';
    } else if (r.wowLeads > 0) {
      wowHtml = `<span class="wow-cell wow-up">&#9650; ${Math.abs(r.wowLeads * 100).toFixed(0)}%</span>`;
    } else {
      wowHtml = `<span class="wow-cell wow-down">&#9660; ${Math.abs(r.wowLeads * 100).toFixed(0)}%</span>`;
    }

    // Per-entity ROAS — hidden until attribution is sorted out
    // const entityROAS = (r.rev && r.spend) ? (r.rev / r.spend).toFixed(2) + 'x' : '<span style="opacity:.4">—</span>';

    const ddId = `exec-dd-${r.cfg.key}`;
    const leadCount = r.leads.length;
    const ddItemsHtml = leadCount === 0
      ? '<div class="exec-leads-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
      : r.leads.map((l, i) =>
          `<div class="exec-leads-item" data-lead-idx="${i}">${_leadItemLabel(l, r.statusField)}</div>`
        ).join('');
    const leadsCell = leadCount > 0
      ? `<div class="exec-leads-dd" id="${ddId}">
           <button class="exec-leads-btn">${fmt.int(r.nl)}
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
           </button>
           <div class="exec-leads-list">${ddItemsHtml}</div>
         </div>`
      : `<span style="opacity:.4">${fmt.int(r.nl)}</span>`;

    html += `<tr>
      <td><span class="entity-dot" style="background:${accent}"></span><span class="entity-name">${r.cfg.label}</span></td>
      <td>${leadsCell}</td>
      <td>${wowHtml}</td>
      <td>${r.spend > 0 ? fmt.currency(r.spend) : '<span style="opacity:.4">—</span>'}</td>
      <td>${r.rev > 0 ? fmt.currency(r.rev) : '<span style="opacity:.4">—</span>'}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  section.innerHTML = html;

  // Wire up executive summary lead dropdowns
  rows.forEach(r => {
    const ddId = `exec-dd-${r.cfg.key}`;
    const container = section.querySelector(`#${ddId}`);
    if (!container) return;
    const btn = container.querySelector('.exec-leads-btn');
    const list = container.querySelector('.exec-leads-list');
    if (!btn || !list) return;

    btn.addEventListener('click', e => {
      e.stopPropagation();
      // Close any other open dropdowns in exec summary
      section.querySelectorAll('.exec-leads-list.open').forEach(l => { if (l !== list) l.classList.remove('open'); });
      list.classList.toggle('open');
    });

    list.addEventListener('click', e => {
      const item = e.target.closest('[data-lead-idx]');
      if (!item) return;
      list.classList.remove('open');
      const idx = parseInt(item.dataset.leadIdx, 10);
      if (r.leads[idx]) r.modalFn(r.leads[idx]);
    });
  });

  return section;
}

// ── Draw SEO sparkline trend charts ──────────────────────────────────────────
document.querySelectorAll('.seo-trend-canvas').forEach(canvas => {
  const daily = JSON.parse(canvas.dataset.daily || '[]');
  const color = canvas.dataset.color || '#555';
  if (daily.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const vals = daily.map(d => d.sessions);
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  const pad = 8;
  const plotW = w - pad * 2;
  const plotH = h - pad * 2;

  const pts = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1)) * plotW,
    y: pad + plotH - ((v - min) / range) * plotH,
  }));

  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, h);
  ctx.closePath();
  ctx.fillStyle = color + '18';
  ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // Labels (first & last)
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText(vals[0], pts[0].x, pts[0].y - 8);
  ctx.textAlign = 'right';
  ctx.fillText(vals[vals.length - 1], pts[pts.length - 1].x, pts[pts.length - 1].y - 8);
});

} // end renderDashboard

// Close all open lead dropdowns on any document click (registered once)
document.addEventListener('click', () => {
  document.querySelectorAll('.leads-dropdown-list.open').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.exec-leads-list.open').forEach(l => l.classList.remove('open'));
});

// Modal close handlers (registered once, outside renderDashboard)
const _leadsModal = document.getElementById('lead-modal');
document.getElementById('lead-modal-close')?.addEventListener('click', () => {
  _leadsModal.style.display = 'none';
});
_leadsModal?.addEventListener('click', e => {
  if (e.target === _leadsModal) _leadsModal.style.display = 'none';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && _leadsModal) _leadsModal.style.display = 'none';
});

// Initial render
renderDashboard();

</script>
</body>
</html>
