<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ── Reset & base ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #f5f4f1;
  color: #1e1d1b;
  line-height: 1.5;
}

/* ── Site header ──────────────────────────────────────────────────── */
.site-header {
  background: #1e1d1b;
  color: #fff;
  padding: 1.5rem 2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 1rem;
}
.site-header h1 {
  font-size: 1.375rem;
  font-weight: 700;
  letter-spacing: -.02em;
  flex: 1;
}
.header-meta {
  font-size: .8125rem;
  color: #b0afa9;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .2rem;
}
.header-spend {
  font-size: 1.25rem;
  font-weight: 700;
  color: #fff;
}

/* ── Container ────────────────────────────────────────────────────── */
.container { max-width: 960px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

/* ── Accordion ────────────────────────────────────────────────────── */
.accordion { border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1rem; background: #fff; }
.accordion.open { overflow: visible; }

.acc-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  padding: .9rem 1.25rem;
  cursor: pointer;
  user-select: none;
  background: #fff;
  border: none;
  width: 100%;
  text-align: left;
  transition: background .15s;
  border-left: 4px solid transparent;
}
.acc-header:hover { background: #fafaf8; }
.accordion.open .acc-header { border-left-color: var(--accent); }

.swatch {
  width: 12px; height: 12px; border-radius: 50%;
  flex-shrink: 0;
  background: var(--accent);
}
.acc-name { font-weight: 600; font-size: .9375rem; flex: 1; }

.pills { display: flex; gap: .35rem; flex-wrap: wrap; }
.pill {
  font-size: .6875rem; font-weight: 600; letter-spacing: .02em;
  padding: .15rem .5rem; border-radius: 100px;
  background: #f0efeb; color: #555;
}

.chips { display: flex; gap: .5rem; flex-wrap: wrap; }
.chip {
  font-size: .75rem; font-weight: 500;
  padding: .2rem .6rem; border-radius: 6px;
  background: var(--metric-bg); color: #333;
}

.spend-badge {
  font-weight: 700; font-size: .9375rem;
  white-space: nowrap;
}

.chevron {
  width: 18px; height: 18px; flex-shrink: 0;
  color: #aaa;
  transition: transform .25s;
}
.accordion.open .chevron { transform: rotate(180deg); }

/* ── Accordion body ───────────────────────────────────────────────── */
.acc-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.acc-body-inner {
  padding: 1.25rem 1.5rem 1.5rem;
  border-top: 1px solid #f0efeb;
}

/* ── Warning box ──────────────────────────────────────────────────── */
.warning-box {
  background: #fffbeb;
  border: 1px solid #fbbf24;
  border-radius: 8px;
  padding: .65rem 1rem;
  font-size: .8125rem;
  color: #78350f;
  margin-bottom: 1rem;
}

/* ── At-a-glance metric cards ─────────────────────────────────────── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .65rem;
  margin-bottom: 1.25rem;
}
.metric-card {
  background: var(--metric-bg);
  border-radius: 8px;
  padding: .75rem 1rem;
}
.metric-label { font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #666; margin-bottom: .25rem; }
.metric-value { font-size: 1.125rem; font-weight: 700; color: #1e1d1b; }
.metric-sub   { font-size: .75rem; color: #888; margin-top: .1rem; }

/* ── Platform sections ────────────────────────────────────────────── */
.platform-section { margin-bottom: 1.25rem; }
.platform-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--accent);
  margin-bottom: .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid #f0efeb;
}
.campaign-name {
  font-size: .72rem; font-weight: 600; color: #555;
  padding: .45rem 0 .2rem;
  border-top: 1px dashed #e8e6e0;
  margin-top: .35rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.campaign-name:first-of-type { border-top: none; margin-top: 0; }
.campaign-total {
  font-style: italic; color: #333;
  border-top: 1px solid #d0cec8;
  margin-top: .5rem; padding-top: .5rem;
}
.platform-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem;
}
.prow-item { font-size: .8125rem; }
.prow-item strong { display: block; font-weight: 700; }
.prow-item span   { color: #888; font-size: .75rem; }

/* ── Search terms ─────────────────────────────────────────────────── */
.search-terms-section { margin-top: .5rem; }
.search-terms-section h4 {
  font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: #555; margin-bottom: .65rem;
}
.search-terms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.term-list { list-style: none; }
.term-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: .35rem .5rem;
  border-radius: 5px;
  font-size: .8rem;
  margin-bottom: .25rem;
  background: #f8f8f6;
}
.term-list li.converted { background: #f0fdf4; }
.term-list li.negative  { background: #fef2f2; }
.term-name { flex: 1; margin-right: .5rem; word-break: break-word; }
.term-meta { font-size: .7rem; color: #888; white-space: nowrap; }
.term-list li.converted .term-name { color: #15803d; }
.term-list li.negative  .term-name { color: #b91c1c; }

/* ── Summary table ────────────────────────────────────────────────── */
.summary-table { width: 100%; border-collapse: collapse; font-size: .8375rem; }
.summary-table th {
  text-align: left; font-weight: 600; font-size: .75rem; text-transform: uppercase;
  letter-spacing: .06em; color: #888; padding: .5rem .75rem; border-bottom: 2px solid #e8e7e3;
}
.summary-table td { padding: .6rem .75rem; border-bottom: 1px solid #f0efeb; }
.summary-table tr:last-child td { border-bottom: none; }
.summary-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.summary-table tr.entity-row td:first-child {
  border-left: 3px solid var(--accent);
  padding-left: .625rem;
}
.summary-footnote { font-size: .75rem; color: #888; margin-top: .5rem; }

/* ── Empty state ──────────────────────────────────────────────────── */
.empty-state {
  font-size: .875rem; color: #999; font-style: italic;
  padding: .5rem 0;
}

/* ── Tripleseat leads section ─────────────────────────────────────── */
.leads-section {
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid #f0efeb;
}
.leads-header {
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: .75rem;
}
.leads-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
}
.leads-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  font-size: .75rem; font-weight: 700;
  padding: .15rem .55rem; border-radius: 100px;
  min-width: 1.5rem;
}

/* custom dropdown */
.leads-dropdown { position: relative; display: inline-block; }
.leads-dropdown-btn {
  display: flex; align-items: center; gap: .4rem;
  background: #fff; border: 1px solid #ddd; border-radius: 7px;
  padding: .4rem .75rem; font-size: .8125rem; font-family: inherit;
  cursor: pointer; color: #333; white-space: nowrap;
  transition: border-color .15s;
}
.leads-dropdown-btn:hover { border-color: var(--accent); }
.leads-dropdown-btn svg { width: 14px; height: 14px; color: #999; flex-shrink: 0; }
.leads-dropdown-list {
  position: fixed;
  background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
  min-width: 220px; max-height: 220px; overflow-y: auto;
  z-index: 1000; display: none;
}
.leads-dropdown-list.open { display: block; }
.leads-dropdown-item {
  padding: .5rem .85rem; font-size: .8125rem; cursor: pointer;
  border-bottom: 1px solid #f5f5f3; transition: background .1s;
}
.leads-dropdown-item:last-child { border-bottom: none; }
.leads-dropdown-item:hover { background: var(--metric-bg); color: var(--accent); }

/* lead modal */
.lead-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 1rem;
}
.lead-modal-box {
  background: #fff; border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
  padding: 1.75rem 2rem;
  width: 100%; max-width: 440px;
  position: relative;
  font-family: 'DM Sans', system-ui, sans-serif;
}
.lead-modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; cursor: pointer;
  font-size: 1.1rem; color: #aaa; line-height: 1;
}
.lead-modal-close:hover { color: #333; }
.lead-modal-title {
  font-size: 1.0625rem; font-weight: 700; margin-bottom: 1.1rem;
  padding-right: 1.5rem; color: #1e1d1b;
}
.lead-modal-fields { display: grid; grid-template-columns: auto 1fr; gap: .45rem .75rem; align-items: baseline; }
.lead-modal-key {
  font-size: .7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: #888; white-space: nowrap;
}
.lead-modal-val { font-size: .875rem; color: #1e1d1b; word-break: break-word; }

/* ── SEO section ──────────────────────────────────────────────────── */
.section-divider {
  border: none; border-top: 2px solid #e4e3de;
  margin: 2rem 0 1.5rem;
}
.section-heading {
  font-size: 1.0625rem; font-weight: 700; letter-spacing: -.01em;
  color: #1e1d1b; margin-bottom: 1rem;
}
.seo-organic-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent);
  margin: 0 0 .5rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid #f0efeb;
}
.seo-conv-row {
  display: flex; align-items: center; gap: 1.5rem;
  padding: .75rem 0;
  border-top: 1px solid #f0efeb;
  margin-top: .25rem;
}
.seo-conv-item { font-size: .875rem; }
.seo-conv-item strong { font-weight: 700; font-size: 1.05rem; }
.seo-conv-item span   { color: #888; font-size: .75rem; display: block; }
.seo-st-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: #555;
  margin: 1rem 0 .5rem;
  padding-top: 1rem;
  border-top: 1px solid #f0efeb;
}

/* ── SEO enhanced sections ───────────────────────────────────────── */
.seo-section-label {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--accent, #555);
  margin: 1.25rem 0 .5rem;
  padding-top: .75rem;
  border-top: 1px solid #f0efeb;
}
.seo-section-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }
.seo-trend-canvas {
  width: 100%; height: 80px; margin: .5rem 0;
  border-radius: 6px; background: #fafaf8;
}
.seo-change-row {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: .5rem;
}
.seo-change-item {
  font-size: .85rem;
}
.seo-change-item .change-val {
  font-weight: 700; font-size: 1rem;
}
.seo-change-item .change-val.up   { color: #15803d; }
.seo-change-item .change-val.down { color: #b91c1c; }
.seo-change-item .change-label {
  color: #888; font-size: .7rem; display: block;
}
.seo-lp-table {
  width: 100%; border-collapse: collapse; font-size: .8125rem;
  margin-top: .25rem;
}
.seo-lp-table th {
  text-align: left; font-weight: 600; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .06em; color: #888; padding: .4rem .5rem;
  border-bottom: 2px solid #e8e7e3;
}
.seo-lp-table th:last-child { text-align: right; }
.seo-lp-table td { padding: .4rem .5rem; border-bottom: 1px solid #f0efeb; }
.seo-lp-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.seo-lp-table tr:last-child td { border-bottom: none; }
.seo-nvr-bar {
  display: flex; height: 24px; border-radius: 4px; overflow: hidden;
  margin: .5rem 0; font-size: .7rem; font-weight: 600;
}
.seo-nvr-bar .new { background: #dbeafe; color: #1e40af; display: flex; align-items: center; justify-content: center; }
.seo-nvr-bar .ret { background: #fef3c7; color: #92400e; display: flex; align-items: center; justify-content: center; }
.seo-nvr-legend {
  display: flex; gap: 1.25rem; font-size: .8rem; margin-top: .25rem;
}
.seo-nvr-legend span { font-weight: 600; }
.seo-gsc-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: .5rem; margin-top: .25rem;
}

/* ── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 600px) {
  .site-header { padding: 1.25rem 1rem; }
  .chips, .pills { display: none; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .search-terms-grid { grid-template-columns: 1fr; }
  .platform-row { grid-template-columns: repeat(2, 1fr); }
}
</style>

// ── Entity style config ──────────────────────────────────────────────────────
const ENTITY_STYLES = {
  events_506:      { accent: '#185fa5', metricBg: '#eef4fb' },
  private_office:  { accent: '#c87520', metricBg: '#fff3e6' },
  catering:        { accent: '#534ab7', metricBg: '#f2f0fc' },
  oak_and_glow:    { accent: '#3b6d11', metricBg: '#eef6e8' },
  smashing_boxes:  { accent: '#993556', metricBg: '#fdf0f4' },
  coworking:       { accent: '#c87520', metricBg: '#fef4e8' },
  // SEO-only entities
  durham_bottling: { accent: '#185fa5', metricBg: '#eef4fb' },
  nerra_catering:  { accent: '#534ab7', metricBg: '#f2f0fc' },
  nerra_dining:    { accent: '#2d7a7a', metricBg: '#e8f5f5' },
};

const ENTITY_ORDER = ['events_506','private_office','catering','oak_and_glow','smashing_boxes','coworking'];

// ── Formatters ───────────────────────────────────────────────────────────────
const fmt = {
  currency: v => v == null ? '—' : '$' + (+v).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}),
  int:      v => v == null ? '—' : (+v).toLocaleString('en-US', {maximumFractionDigits:0}),
  pct:      v => v == null ? '—' : (+v*100).toFixed(1) + '%',
  dec:      (v,d=2) => v == null ? '—' : (+v).toFixed(d),
};

// ── Header ───────────────────────────────────────────────────────────────────
document.getElementById('header-dates').textContent     = REPORT.date_range;
document.getElementById('header-generated').textContent = 'Generated ' + REPORT.generated_date;
document.getElementById('header-spend').textContent     = 'Total spend: ' + fmt.currency(REPORT.total_spend);

// ── Build UI ─────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function el(tag, cls, inner) {
  const e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (inner) e.innerHTML = inner;
  return e;
}

function metricCard(label, value, sub) {
  const card = el('div', 'metric-card');
  card.innerHTML = `<div class="metric-label">${label}</div><div class="metric-value">${value}</div>${sub ? `<div class="metric-sub">${sub}</div>` : ''}`;
  return card;
}

function pRowItem(label, value) {
  return `<div class="prow-item"><strong>${value}</strong><span>${label}</span></div>`;
}

// ── Summary accordion ────────────────────────────────────────────────────────
function buildSummary() {
  const entities = REPORT.entities;
  const rows = ENTITY_ORDER.map(key => {
    const e   = entities[key];
    const sty = ENTITY_STYLES[key];
    if (!e) return '';
    const cpl = e.cpl != null ? fmt.currency(e.cpl) : '—';
    return `
      <tr class="entity-row" style="--accent:${sty.accent};--metric-bg:${sty.metricBg}">
        <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${sty.accent};margin-right:.4rem;vertical-align:middle;"></span>${e.label}</td>
        <td>${e.platforms.join(', ') || '—'}</td>
        <td class="num">${fmt.currency(e.total_spend)}</td>
        <td class="num">${fmt.int(e.total_clicks)}</td>
        <td class="num">${fmt.dec(e.total_conversions)}</td>
        <td class="num">${cpl}</td>
      </tr>`;
  }).join('');

  const totalSpend = ENTITY_ORDER.reduce((s, k) => s + (entities[k]?.total_spend || 0), 0);

  const acc = buildAccordion('summary', '', 'Weekly Summary', [], [], fmt.currency(totalSpend), false);
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = `
    <table class="summary-table">
      <thead><tr>
        <th>Entity</th><th>Platforms</th>
        <th class="num">Spend</th><th class="num">Clicks</th>
        <th class="num">Conv.</th><th class="num">CPL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p class="summary-footnote">* Catering conversion data may be unreliable — form lead attribution varies by window.</p>
  `;
  return acc;
}

// ── Entity accordion ─────────────────────────────────────────────────────────
function buildEntityAccordion(key) {
  const e   = REPORT.entities[key];
  const sty = ENTITY_STYLES[key];
  if (!e) return null;

  const chips = [];
  if (e.total_clicks)      chips.push(`${fmt.int(e.total_clicks)} clicks`);
  if (e.total_conversions) chips.push(`${fmt.dec(e.total_conversions)} conv.`);
  if (e.cpl != null)       chips.push(`${fmt.currency(e.cpl)} CPL`);

  const acc = buildAccordion(key, sty.accent, e.label, e.platforms, chips, fmt.currency(e.total_spend));
  acc.style.setProperty('--metric-bg', sty.metricBg);
  const bodyInner = acc.querySelector('.acc-body-inner');
  bodyInner.innerHTML = buildEntityBody(key, e, sty);
  return acc;
}

function buildEntityBody(key, e, sty) {
  let html = '';

  // Warning box
  if (key === 'catering' || key === 'smashing_boxes') {
    html += `<div class="warning-box">⚠ Conversion data may be unreliable for this entity — verify in platform dashboards before reporting externally.</div>`;
  }

  // No data state
  const hasAny = e.google || e.meta || e.linkedin;
  if (!hasAny) {
    return html + `<p class="empty-state">No active campaigns this period.</p>`;
  }

  // At-a-glance metrics — blended across all active platforms
  html += `<div class="metrics-grid">`;

  const blendSpend = e.total_spend;
  const blendClicks = e.total_clicks;
  const blendConv = e.total_conversions;
  const blendImpr = (e.google?.impressions || 0) + (e.meta?.impressions || 0) + (e.linkedin?.impressions || 0);
  const blendCTR = blendImpr ? blendClicks / blendImpr : null;
  const blendCPL = blendConv ? blendSpend / blendConv : null;
  const blendReach = Math.max(e.meta?.reach || 0, e.linkedin?.reach || 0) || null;
  const blendCPM = blendImpr ? (blendSpend * 1000 / blendImpr) : null;

  html += metricCard('Spend', fmt.currency(blendSpend), e.platforms.join(' + ')).outerHTML;
  html += metricCard('Clicks', fmt.int(blendClicks), `CTR ${fmt.pct(blendCTR)}`).outerHTML;
  if (key !== 'events_506') {
    html += metricCard('Conversions', fmt.dec(blendConv), `CPL ${fmt.currency(blendCPL)}`).outerHTML;
  } else {
    html += metricCard('Conversions', fmt.dec(blendConv), null).outerHTML;
  }
  html += metricCard('Impressions', fmt.int(blendImpr), null).outerHTML;
  html += metricCard('Reach', fmt.int(blendReach), null).outerHTML;
  html += metricCard('CPM', fmt.currency(blendCPM), null).outerHTML;
  html += `</div>`; // /metrics-grid

  // Per-platform detail rows — broken out by campaign
  function gRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('Conversions', fmt.dec(c.conversions))}
      ${pRowItem('CPL', fmt.currency(c.cost_per_conversion))}
      ${pRowItem('Quality Score', c.quality_score != null ? fmt.dec(c.quality_score,1) : '—')}
      ${pRowItem('Impr. Share', c.search_impression_share != null ? fmt.pct(c.search_impression_share) : '—')}
    </div>`;
  }
  function mRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Frequency', c.frequency != null ? fmt.dec(c.frequency,2) : '—')}
      ${pRowItem('Link Clicks', fmt.int(c.link_clicks))}
      ${key !== 'events_506' ? pRowItem('Leads', fmt.int(c.leads)) : ''}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${key !== 'events_506' ? pRowItem('CPL', fmt.currency(c.cost_per_lead)) : ''}
      ${pRowItem('Engagement', fmt.int(c.engagement))}
    </div>`;
  }
  function lRow(c) {
    return `<div class="platform-row">
      ${pRowItem('Spend', fmt.currency(c.spend))}
      ${pRowItem('Impressions', fmt.int(c.impressions))}
      ${pRowItem('Reach', fmt.int(c.reach))}
      ${pRowItem('Clicks', fmt.int(c.clicks))}
      ${pRowItem('CTR', fmt.pct(c.ctr))}
      ${pRowItem('CPC', fmt.currency(c.cpc))}
      ${pRowItem('CPM', fmt.currency(c.cpm))}
      ${pRowItem('Conversions', fmt.int(c.conversions))}
      ${pRowItem('Leads (1-click)', fmt.int(c.leads))}
      ${pRowItem('Form Opens', fmt.int(c.form_opens))}
      ${pRowItem('Eng. Rate', c.engagement_rate != null ? fmt.pct(c.engagement_rate) : '—')}
    </div>`;
  }

  if (e.google && e.google_campaigns && e.google_campaigns.length) {
    const multi = e.google_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Google Ads</div>`;
    for (const c of e.google_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${gRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${gRow(e.google)}`;
    }
    html += `</div>`;
  }

  if (e.meta && e.meta_campaigns && e.meta_campaigns.length) {
    const multi = e.meta_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">Meta</div>`;
    for (const c of e.meta_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${mRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${mRow(e.meta)}`;
    }
    html += `</div>`;
  }

  if (e.linkedin && e.linkedin_campaigns && e.linkedin_campaigns.length) {
    const multi = e.linkedin_campaigns.length > 1;
    html += `<div class="platform-section">
      <div class="platform-label" style="color:${sty.accent}">LinkedIn</div>`;
    for (const c of e.linkedin_campaigns) {
      html += `<div class="campaign-name">${c.name}</div>${lRow(c)}`;
    }
    if (multi) {
      html += `<div class="campaign-name campaign-total">Total</div>${lRow(e.linkedin)}`;
    }
    html += `</div>`;
  }

  // Search terms removed from paid ads section per user request

  // Tripleseat leads — Events at 506 only
  if (key === 'events_506') {
    html += buildLeadsSection(Array.isArray(e.leads) ? e.leads : [], {
      label:    'Tripleseat Leads',
      idPrefix: 'leads',
    });
  }

  // Coworking Office leads — Private Office only
  if (key === 'private_office') {
    html += buildLeadsSection(Array.isArray(e.office_leads) ? e.office_leads : [], {
      label:    'Coworking Office Leads',
      idPrefix: 'office-leads',
    });
  }

  return html;
}

function buildSearchTerms(st, sty) {
  function termLi(t, cls) {
    const conv = t.conversions > 0 ? ' converted' : '';
    return `<li class="${cls}${t.conversions > 0 ? ' converted' : ''}">
      <span class="term-name">${t.term}</span>
      <span class="term-meta">${t.clicks} clk · $${(+t.spend).toFixed(2)}</span>
    </li>`;
  }

  const topHtml = st.top.map(t => termLi(t, '')).join('');
  const negHtml = st.negatives.map(t => termLi(t, 'negative')).join('');

  return `
  <div class="search-terms-section">
    <div class="search-terms-grid">
      <div>
        <h4>Top search terms — suggest as keywords</h4>
        <ul class="term-list">${topHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
      <div>
        <h4>Search terms to review — negative keyword candidates</h4>
        <ul class="term-list">${negHtml || '<li style="color:#999;font-style:italic">No data</li>'}</ul>
      </div>
    </div>
  </div>`;
}

// ── Generic leads section ────────────────────────────────────────────────────
function buildLeadsSection(leads, opts) {
  const label    = (opts && opts.label)    || 'Leads';
  const pfx      = (opts && opts.idPrefix) || 'leads';
  const count    = leads.length;
  const btnLabel = count === 0 ? 'No leads this period' : 'Select a lead';

  const itemsHtml = count === 0
    ? '<div class="leads-dropdown-item" style="color:#999;font-style:italic;cursor:default">No leads this period</div>'
    : leads.map((l, i) =>
        `<div class="leads-dropdown-item" data-lead-idx="${i}">${l.name || '(unnamed)'}</div>`
      ).join('');

  return `
  <div class="leads-section">
    <div class="leads-header">
      <span class="leads-label">${label}</span>
      <span class="leads-count-badge">${count}</span>
      <div class="leads-dropdown" id="${pfx}-dd">
        <button class="leads-dropdown-btn" id="${pfx}-dd-btn" ${count === 0 ? 'disabled style="opacity:.5;cursor:default"' : ''}>
          ${btnLabel}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="leads-dropdown-list" id="${pfx}-dd-list">${itemsHtml}</div>
      </div>
    </div>
  </div>`;
}

function initLeadsDropdown(leads, idPrefix, openFn) {
  const pfx  = idPrefix || 'leads';
  const btn  = document.getElementById(pfx + '-dd-btn');
  const list = document.getElementById(pfx + '-dd-list');
  if (!btn || !list || leads.length === 0) return;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const rect = btn.getBoundingClientRect();
    list.style.top  = (rect.bottom + 4) + 'px';
    list.style.left = rect.left + 'px';
    list.classList.toggle('open');
  });

  list.addEventListener('click', e => {
    const item = e.target.closest('[data-lead-idx]');
    if (!item) return;
    list.classList.remove('open');
    openFn(leads[+item.dataset.leadIdx]);
  });

  document.addEventListener('click', () => list.classList.remove('open'));
}

function _showModal(title, fieldPairs) {
  const modal = document.getElementById('lead-modal');
  if (!modal) return;
  modal.querySelector('.lead-modal-title').textContent = title || '(unnamed)';
  modal.querySelector('.lead-modal-fields').innerHTML = fieldPairs.map(([k, v]) =>
    `<span class="lead-modal-key">${k}</span><span class="lead-modal-val">${v || '—'}</span>`
  ).join('');
  modal.style.display = 'flex';
}

function openLeadModal(lead) {
  _showModal(lead.name, [
    ['Created',         lead.created],
    ['Email',           lead.email],
    ['Event Date',      lead.event_date],
    ['Guests',          lead.guests],
    ['Nature of Event', lead.event_type],
    ['Lead Source',     lead.lead_source],
  ]);
}

function openOfficeLeadModal(lead) {
  _showModal(lead.name, [
    ['Date Submitted', lead.date_submitted],
    ['Email',          lead.email],
    ['Lead Interest',  lead.lead_interest],
    ['Message',        lead.message],
  ]);
}

// ── Accordion builder ────────────────────────────────────────────────────────
function buildAccordion(key, accent, name, platforms, chips, spend, startOpen=false) {
  const sty = ENTITY_STYLES[key] || {};
  const acc = el('div', 'accordion' + (startOpen ? ' open' : ''));
  if (accent) acc.style.setProperty('--accent', accent);
  else if (sty.accent) acc.style.setProperty('--accent', sty.accent);
  if (sty.metricBg) acc.style.setProperty('--metric-bg', sty.metricBg);

  const swatchHtml = accent ? `<div class="swatch"></div>` : '';

  const pillsHtml = platforms.length
    ? `<div class="pills">${platforms.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`
    : '';

  const chipsHtml = chips.length
    ? `<div class="chips">${chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>`
    : '';

  const hdr = el('button', 'acc-header');
  hdr.setAttribute('aria-expanded', startOpen ? 'true' : 'false');
  hdr.innerHTML = `
    ${swatchHtml}
    <span class="acc-name">${name}</span>
    ${pillsHtml}
    ${chipsHtml}
    <span class="spend-badge">${spend}</span>
    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  `;

  const body = el('div', 'acc-body');
  const bodyInner = el('div', 'acc-body-inner');
  body.appendChild(bodyInner);

  acc.appendChild(hdr);
  acc.appendChild(body);

  if (startOpen) {
    // Set after DOM insertion
    requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
  }

  hdr.addEventListener('click', () => {
    const isOpen = acc.classList.contains('open');
    if (isOpen) {
      acc.classList.remove('open');
      body.style.maxHeight = '0';
      hdr.setAttribute('aria-expanded', 'false');
    } else {
      acc.classList.add('open');
      body.style.maxHeight = body.scrollHeight + 'px';
      hdr.setAttribute('aria-expanded', 'true');
    }
  });

  return acc;
}

// ── SEO accordion ────────────────────────────────────────────────────────────
const SEO_ORDER = ['durham_bottling', 'nerra_catering', 'nerra_dining', 'oak_and_glow', 'smashing_boxes'];

function fmtDuration(secs) {
  if (secs == null) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function buildSeoBody(entity, data, sty) {
  const ga4 = data.ga4 || {};
  const org  = ga4.organic;
  const daily = data.daily_organic || [];
  const wm = data.wow_mom || {};
  const lp = data.landing_pages || [];
  const nvr = data.new_vs_returning || {};
  const gsc = data.organic_search;
  let html = '';

  // ── Organic Sessions with trend + WoW ──
  html += `<div class="seo-section-label" style="color:${sty.accent}">Organic Sessions</div>`;
  if (!org || org.sessions === 0) {
    html += `<p class="empty-state">No organic search sessions this period.</p>`;
  } else {
    // Summary metrics row
    html += `<div class="metrics-grid">`;
    html += metricCard('Sessions', fmt.int(org.sessions), 'Organic Search').outerHTML;
    html += metricCard('Users', fmt.int(org.users), null).outerHTML;
    html += metricCard('Engaged', fmt.int(org.engaged_sessions), null).outerHTML;
    html += `</div>`;

    // WoW change
    if (wm.wow_change != null) {
      const pct = (wm.wow_change * 100).toFixed(1);
      const cls = wm.wow_change >= 0 ? 'up' : 'down';
      const arrow = wm.wow_change >= 0 ? '\u25B2' : '\u25BC';
      html += `<div class="seo-change-row">
        <div class="seo-change-item">
          <span class="change-val ${cls}">${arrow} ${Math.abs(pct)}%</span>
          <span class="change-label">vs previous ${wm.period_days}-day period (${fmt.int(wm.prev_total)} sessions)</span>
        </div>
      </div>`;
    }

    // Sparkline trend
    if (daily.length > 1) {
      html += `<canvas class="seo-trend-canvas" data-daily='${JSON.stringify(daily)}' data-color="${sty.accent}"></canvas>`;
    }
  }

  // ── Organic Conversions ──
  if (org && org.conversions > 0) {
    html += `<div class="seo-section-label">Organic Conversions</div>`;
    html += `<div class="seo-conv-row">
      <div class="seo-conv-item">
        <strong>${fmt.int(org.conversions)}</strong>
        <span>Conversions</span>
      </div>
      <div class="seo-conv-item">
        <strong>${fmt.pct(org.conversion_rate)}</strong>
        <span>Conversion Rate</span>
      </div>
    </div>`;
  }

  // ── Engagement Rate ──
  if (org && org.engagement_rate != null) {
    html += `<div class="seo-section-label">Organic Engagement</div>`;
    html += `<div class="metrics-grid">`;
    html += metricCard('Engagement Rate', fmt.pct(org.engagement_rate), null).outerHTML;
    html += metricCard('Bounce Rate', fmt.pct(org.bounce_rate), null).outerHTML;
    html += metricCard('Avg. Session', fmtDuration(org.avg_session_duration), null).outerHTML;
    html += `</div>`;
  }

  // ── Google Search Impressions + Avg Position ──
  html += `<div class="seo-section-label">Google Search Performance</div>`;
  if (gsc) {
    html += `<div class="seo-gsc-grid">`;
    html += metricCard('Impressions', fmt.int(gsc.impressions), null).outerHTML;
    html += metricCard('Clicks', fmt.int(gsc.clicks), null).outerHTML;
    html += metricCard('Avg. Position', gsc.avg_position != null ? gsc.avg_position.toFixed(1) : '—', null).outerHTML;
    html += metricCard('CTR', fmt.pct(gsc.ctr), null).outerHTML;
    html += `</div>`;
  } else {
    html += `<p class="empty-state">Pending GSC Connection</p>`;
  }

  // ── Top 5 Queries Driving Traffic ──
  html += `<div class="seo-section-label">Top Queries Driving Traffic</div>`;
  html += `<p class="empty-state">Pending GSC Connection</p>`;

  // ── Top 10 Organic Landing Pages ──
  html += `<div class="seo-section-label">Top Organic Landing Pages</div>`;
  if (lp.length) {
    html += `<table class="seo-lp-table"><thead><tr><th>Page</th><th>Sessions</th></tr></thead><tbody>`;
    for (const p of lp) {
      html += `<tr><td>${p.page}</td><td>${fmt.int(p.sessions)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    html += `<p class="empty-state">No organic landing page data this period.</p>`;
  }

  // ── New vs Returning Users ──
  html += `<div class="seo-section-label">New vs Returning (Organic)</div>`;
  if (nvr.new_sessions || nvr.returning_sessions) {
    const newPct = nvr.new_pct != null ? (nvr.new_pct * 100).toFixed(0) : 0;
    const retPct = nvr.returning_pct != null ? (nvr.returning_pct * 100).toFixed(0) : 0;
    html += `<div class="seo-nvr-bar">
      <div class="new" style="width:${newPct}%">${newPct}%</div>
      <div class="ret" style="width:${retPct}%">${retPct}%</div>
    </div>`;
    html += `<div class="seo-nvr-legend">
      <div>New: <span>${fmt.int(nvr.new_sessions)}</span> sessions · <span>${fmt.int(nvr.new_users)}</span> users</div>
      <div>Returning: <span>${fmt.int(nvr.returning_sessions)}</span> sessions · <span>${fmt.int(nvr.returning_users)}</span> users</div>
    </div>`;
  } else {
    html += `<p class="empty-state">No new vs returning data this period.</p>`;
  }

  // ── Top Keyword Movements ──
  html += `<div class="seo-section-label">Top Keyword Movements</div>`;
  html += `<p class="empty-state">Pending GSC Connection</p>`;

  return html;
}

function buildSeoAccordion(entity) {
  const data = (REPORT.seo || {})[entity];
  const sty  = ENTITY_STYLES[entity];
  if (!data || !sty) return null;

  const org = data.ga4?.organic;
  const gsc = data.organic_search;
  const chips = [];
  if (org && org.sessions) chips.push(`${fmt.int(org.sessions)} organic sessions`);
  if (gsc && gsc.impressions) chips.push(`${fmt.int(gsc.impressions)} search impressions`);
  if (org && org.engagement_rate != null) chips.push(`${fmt.pct(org.engagement_rate)} engaged`);

  const acc = buildAccordion(entity, sty.accent, data.label, ['SEO'], chips, '');
  acc.style.setProperty('--metric-bg', sty.metricBg);

  // Hide the spend badge (it's empty for SEO)
  const badge = acc.querySelector('.spend-badge');
  if (badge) badge.style.display = 'none';

  acc.querySelector('.acc-body-inner').innerHTML = buildSeoBody(entity, data, sty);
  return acc;
}

app.appendChild(el('h2', 'section-heading', 'Paid Ads Reports'));

// ── Draw SEO sparkline trend charts ──────────────────────────────────────────
document.querySelectorAll('.seo-trend-canvas').forEach(canvas => {
  const daily = JSON.parse(canvas.dataset.daily || '[]');
  const color = canvas.dataset.color || '#555';
  if (daily.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const vals = daily.map(d => d.sessions);
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  const pad = 8;
  const plotW = w - pad * 2;
  const plotH = h - pad * 2;

  const pts = vals.map((v, i) => ({
    x: pad + (i / (vals.length - 1)) * plotW,
    y: pad + plotH - ((v - min) / range) * plotH,
  }));

  // Fill
  ctx.beginPath();
  ctx.moveTo(pts[0].x, h);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length - 1].x, h);
  ctx.closePath();
  ctx.fillStyle = color + '18';
  ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Dots
  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // Labels (first & last)
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText(vals[0], pts[0].x, pts[0].y - 8);
  ctx.textAlign = 'right';
  ctx.fillText(vals[vals.length - 1], pts[pts.length - 1].x, pts[pts.length - 1].y - 8);
});
